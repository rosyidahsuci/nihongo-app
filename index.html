// ===== STATE =====
let hafalSet = new Set(JSON.parse(localStorage.getItem('hafal') || '[]'));
let filters = { level: 'semua', jenis: 'semua', kaiwa: '0' };
let currentTab = 'browse';
let openCards = new Set();
let quizState = { questions: [], current: 0, correct: 0, answered: false, type: 'jp-id' };
let deferredPrompt = null;

// ===== PWA =====
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}

// ===== FILTER & SEARCH =====
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return vocab.filter(d => {
    if (filters.level !== 'semua' && d.level !== filters.level) return false;
    if (filters.jenis !== 'semua' && d.jenis !== filters.jenis) return false;
    if (filters.kaiwa === '1' && !d.kaiwa) return false;
    if (currentTab === 'hafal' && !hafalSet.has(d.k)) return false;
    if (!q) return true;
    return d.k.includes(q) || d.h.includes(q) || d.r.toLowerCase().includes(q) || d.id.toLowerCase().includes(q);
  });
}

function setFilter(type, val) {
  if (type === 'kaiwa') {
    filters.kaiwa = filters.kaiwa === '1' ? '0' : '1';
  } else {
    filters[type] = val;
  }
  updateFilterChips();
  renderList();
}

function updateFilterChips() {
  const chips = document.querySelectorAll('.chip');
  chips.forEach(c => {
    const onclick = c.getAttribute('onclick') || '';
    if (onclick.includes("'level'")) {
      const v = onclick.match(/'([^']+)'\)/)?.[1];
      c.classList.toggle('active', v === filters.level);
    } else if (onclick.includes("'jenis'")) {
      const v = onclick.match(/'([^']+)'\)/)?.[1];
      c.classList.toggle('active', v === filters.jenis);
    } else if (onclick.includes("'kaiwa'")) {
      c.classList.toggle('active', filters.kaiwa === '1');
    }
  });
}

function onSearch() {
  const val = document.getElementById('search').value;
  document.getElementById('search-clear').style.display = val ? 'flex' : 'none';
  renderList();
}
function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderList();
}

// ===== TABS =====
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['browse','quiz','hafal'][i] === tab);
  });
  document.getElementById('browse-tab').style.display = tab === 'browse' ? '' : 'none';
  document.getElementById('quiz-tab').style.display = tab === 'quiz' ? '' : 'none';
  document.getElementById('hafal-tab').style.display = tab === 'hafal' ? '' : 'none';
  document.getElementById('filters').style.display = tab === 'quiz' ? 'none' : '';
  if (tab === 'browse') renderList();
  if (tab === 'hafal') renderHafal();
  if (tab === 'quiz') startQuiz();
}

// ===== BADGE HELPER =====
function badgeJenis(j) {
  const map = { v:'Kata Kerja', n:'Kata Benda', adj:'Kata Sifat', adv:'Keterangan', expr:'Ekspresi' };
  const cls = { v:'badge-v', n:'badge-n', adj:'badge-adj', adv:'badge-adv', expr:'badge-expr' };
  return `<span class="badge ${cls[j]}">${map[j]||j}</span>`;
}
function badgeLevel(l) {
  return `<span class="badge badge-${l.toLowerCase()}">${l}</span>`;
}

// ===== RENDER LIST =====
function renderList() {
  const list = getFiltered();
  document.getElementById('stats-pill').textContent = list.length + ' kata';
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>Tidak ada hasil ditemukan.</div>';
    return;
  }
  el.innerHTML = list.map(d => {
    const idx = vocab.indexOf(d);
    const isOpen = openCards.has(idx);
    const isHafal = hafalSet.has(d.k);
    return `<div class="card${isOpen?' open':''}${isHafal?' hafal-done':''}" id="vc${idx}">
      <div class="card-head" onclick="toggleCard(${idx})">
        <div class="card-kanji">${d.k}</div>
        <div class="card-meta">
          <div class="card-meaning">${d.id}</div>
          <div class="card-sub">${d.h} · ${d.r}</div>
        </div>
        <div class="card-badges">
          ${badgeLevel(d.level)}
          ${badgeJenis(d.jenis)}
          ${d.kaiwa ? '<span class="badge badge-kaiwa">🗣</span>' : ''}
        </div>
        <button class="hafal-btn${isHafal?' done':''}" onclick="toggleHafal(event,'${d.k}')">${isHafal?'✓':'○'}</button>
        <span class="expand-icon">▾</span>
      </div>
      <div class="card-body">
        <div class="section">
          <div class="section-label">Kalimat contoh</div>
          <div class="sentence-jp">${d.s.jp}</div>
          <div class="sentence-hira">${d.s.h}</div>
          <div class="sentence-romaji">${d.s.r}</div>
          <div class="sentence-id">${d.s.i}</div>
        </div>
        <div class="section">
          <div class="section-label">Kaiwa (会話)</div>
          <div class="kaiwa-box">${d.kw.map(kw=>`
            <div class="kaiwa-line">
              <div class="kaiwa-speaker">${kw.sp}</div>
              <div class="kaiwa-jp">${kw.jp}</div>
              <div class="kaiwa-hira">${kw.h}</div>
              <div class="kaiwa-romaji">${kw.r}</div>
              <div class="kaiwa-id">${kw.i}</div>
            </div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  updateHafalCount();
}

function renderHafal() {
  const list = vocab.filter(d => hafalSet.has(d.k));
  const el = document.getElementById('hafal-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>Belum ada kata yang ditandai hafal.<br>Tekan tombol ○ pada kartu untuk menandai hafal.</div>';
    return;
  }
  document.getElementById('stats-pill').textContent = list.length + ' hafal';
  el.innerHTML = list.map(d => {
    const idx = vocab.indexOf(d);
    return `<div class="card hafal-done" id="hc${idx}">
      <div class="card-head" onclick="toggleCardH(${idx})">
        <div class="card-kanji">${d.k}</div>
        <div class="card-meta">
          <div class="card-meaning">${d.id}</div>
          <div class="card-sub">${d.h} · ${d.r}</div>
        </div>
        <div class="card-badges">${badgeLevel(d.level)}${badgeJenis(d.jenis)}</div>
        <button class="hafal-btn done" onclick="toggleHafal(event,'${d.k}');renderHafal()">✓</button>
        <span class="expand-icon">▾</span>
      </div>
      <div class="card-body">
        <div class="section">
          <div class="section-label">Kalimat contoh</div>
          <div class="sentence-jp">${d.s.jp}</div>
          <div class="sentence-hira">${d.s.h}</div>
          <div class="sentence-romaji">${d.s.r}</div>
          <div class="sentence-id">${d.s.i}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

let openHafal = new Set();
function toggleCardH(idx) {
  const card = document.getElementById('hc'+idx);
  if (card) card.classList.toggle('open');
}

function toggleCard(idx) {
  if (openCards.has(idx)) openCards.delete(idx); else openCards.add(idx);
  const card = document.getElementById('vc'+idx);
  if (card) card.classList.toggle('open');
}

function toggleHafal(e, key) {
  e.stopPropagation();
  if (hafalSet.has(key)) hafalSet.delete(key);
  else hafalSet.add(key);
  localStorage.setItem('hafal', JSON.stringify([...hafalSet]));
  updateHafalCount();
  renderList();
}

function updateHafalCount() {
  document.getElementById('hafal-count').textContent = hafalSet.size;
}

// ===== QUIZ =====
function setQuizType(t) {
  quizState.type = t;
  document.querySelectorAll('.quiz-type-btn').forEach((b,i) => {
    b.classList.toggle('active', ['jp-id','id-jp','romaji'][i] === t);
  });
  startQuiz();
}

function startQuiz() {
  const pool = getFiltered().length > 4 ? getFiltered() : vocab;
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 20);
  quizState.questions = shuffled;
  quizState.current = 0;
  quizState.correct = 0;
  quizState.answered = false;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { questions, current, correct, type } = quizState;
  const el = document.getElementById('quiz-content');
  document.getElementById('quiz-score-top').textContent = `Benar: ${correct} / ${current}`;
  const bar = Math.round((current / questions.length) * 100);
  document.getElementById('quiz-bar').style.width = bar + '%';

  if (current >= questions.length) {
    el.innerHTML = `<div class="quiz-result">
      <div class="quiz-score">${correct}/${questions.length}</div>
      <div class="quiz-score-label">${correct >= questions.length*0.8 ? '🎉 Hebat!' : correct >= questions.length*0.5 ? '👍 Bagus!' : '💪 Terus berlatih!'}</div>
      <p style="font-size:14px;color:var(--text2);margin-bottom:20px">Skor: ${Math.round(correct/questions.length*100)}%</p>
      <button class="quiz-restart" onclick="startQuiz()">Mulai Lagi</button>
    </div>`;
    return;
  }

  const q = questions[current];
  const allWords = vocab;
  const wrong = allWords.filter(w => w.k !== q.k).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...wrong, q].sort(() => Math.random() - 0.5);

  let question, getAnswer;
  if (type === 'jp-id') {
    question = q.k;
    getAnswer = (c) => c.id;
  } else if (type === 'id-jp') {
    question = q.id;
    getAnswer = (c) => c.k;
  } else {
    question = q.k;
    getAnswer = (c) => c.r;
  }

  el.innerHTML = `<div class="quiz-card">
    <div class="quiz-word">${question}</div>
    <div class="quiz-hint">${type === 'jp-id' ? 'Apa artinya?' : type === 'id-jp' ? 'Kanji mana yang benar?' : 'Apa romanjinya?'}</div>
    <div class="quiz-choices">${choices.map(c => `
      <button class="quiz-choice" onclick="answerQuiz(this, '${c.k}', '${q.k}')">${getAnswer(c)}</button>
    `).join('')}</div>
    <button class="quiz-next" id="quiz-next-btn" onclick="nextQuestion()">Lanjut →</button>
  </div>`;
}

function answerQuiz(btn, chosen, correct) {
  if (quizState.answered) return;
  quizState.answered = true;
  const choices = document.querySelectorAll('.quiz-choice');
  choices.forEach(c => {
    c.disabled = true;
    if (c === btn) {
      c.classList.add(chosen === correct ? 'correct' : 'wrong');
    }
    if (chosen !== correct) {
      const q = quizState.questions[quizState.current];
      const type = quizState.type;
      let correctAnswer = type === 'jp-id' ? q.id : type === 'id-jp' ? q.k : q.r;
      if (c.textContent.trim() === correctAnswer) c.classList.add('correct');
    }
  });
  if (chosen === correct) quizState.correct++;
  document.getElementById('quiz-next-btn').style.display = 'block';
}

function nextQuestion() {
  quizState.current++;
  quizState.answered = false;
  renderQuizQuestion();
}

// ===== INIT =====
renderList();
updateHafalCount();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
