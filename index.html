<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日本語">
<link rel="manifest" href="manifest.json">
<title>日本語 Kosakata</title>
<style>
:root{--p:#6C63FF;--pl:#EEEDFE;--pd:#4A42CC;--g:#22c55e;--gl:#dcfce7;--r:#ef4444;--rl:#fee2e2;--a:#f59e0b;--al:#fef3c7;--b:#3b82f6;--bl:#dbeafe;--bg:#f8f7ff;--sf:#ffffff;--bd:#e5e7eb;--t1:#111827;--t2:#6b7280;--t3:#9ca3af;--rr:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overscroll-behavior:none}
/* TOPBAR */
.topbar{background:var(--p);color:#fff;padding:12px 14px 10px;position:sticky;top:0;z-index:200}
.tb1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.app-title{font-size:17px;font-weight:700}
.app-sub{font-size:11px;opacity:.8}
.stats-pill{background:rgba(255,255,255,.2);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:8px 34px;border-radius:99px;border:none;font-size:14px;background:rgba(255,255,255,.95);color:var(--t1);outline:none}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5}
.sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--t3);color:#fff;border:none;border-radius:99px;width:17px;height:17px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
/* TABS */
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:93px;z-index:199;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:10px 14px;font-size:12px;font-weight:500;color:var(--t2);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--p);border-color:var(--p)}
/* FILTERS */
.filters{padding:8px 10px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;background:var(--sf);border-bottom:1px solid var(--bd)}
.filters::-webkit-scrollbar{display:none}
.chip{flex:none;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:500;border:1.5px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer}
.chip.active{background:var(--p);border-color:var(--p);color:#fff}
.chip.ck{border-color:var(--b);color:var(--b)}
.chip.ck.active{background:var(--b);color:#fff}
.divchip{width:1px;background:var(--bd);flex:none;margin:4px 2px}
/* LIST */
.list{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
/* CARD */
.card{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);overflow:hidden}
.card.hd{border-color:var(--g)}
.card-head{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.ck{font-size:26px;font-weight:700;min-width:48px;line-height:1}
.cm{flex:1;min-width:0}
.cmn{font-size:14px;font-weight:600}
.cms{font-size:11px;color:var(--t2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbdg{display:flex;gap:3px;align-items:center;flex-shrink:0}
.bdg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px}
.bn5{background:var(--pl);color:var(--p)}
.bn4{background:var(--bl);color:var(--b)}
.bn3{background:var(--al);color:var(--a)}
.bv{background:#f0fdf4;color:#16a34a}
.bn{background:#eff6ff;color:#1d4ed8}
.badj{background:#fdf4ff;color:#9333ea}
.badv{background:#fff7ed;color:#c2410c}
.bex{background:#f9fafb;color:#374151}
.bkw{background:var(--bl);color:var(--b)}
.hbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hbtn.on{background:var(--g);border-color:var(--g);color:#fff}
.spk-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.spk-btn:active{background:var(--pl)}
.xi{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.card.open .xi{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--bd)}
.card.open .card-body{display:block}
.sec{padding:10px 12px;border-bottom:1px solid var(--bd)}
.sec:last-child{border-bottom:none}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:6px}
.sjp{font-size:17px;color:var(--t1);line-height:1.6}
.sh{font-size:11px;color:var(--t2);margin-top:2px}
.sr{font-size:11px;color:var(--t3)}
.si2{font-size:12px;color:var(--t1);margin-top:4px;font-style:italic}
.kwbox{background:var(--bg);border-radius:var(--rs);padding:9px 10px;display:flex;flex-direction:column;gap:9px}
.kwl{}
.kwsp{font-size:10px;font-weight:700;color:var(--p);margin-bottom:2px}
.kwjp{font-size:15px;color:var(--t1);line-height:1.5}
.kwh{font-size:11px;color:var(--t2)}
.kwr{font-size:11px;color:var(--t3)}
.kwid{font-size:12px;color:var(--t1);margin-top:2px;font-style:italic}
/* FLASHCARD */
.fc-wrap{padding:12px 10px;display:flex;flex-direction:column;gap:10px;min-height:calc(100vh - 190px)}
.fc-ctrl{display:flex;gap:8px;align-items:center}
.fc-ctrl select{flex:1;font-size:13px;height:34px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--t1);padding:0 8px}
.fc-ctrl button{height:34px;padding:0 14px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);font-size:13px;font-weight:500;cursor:pointer;color:var(--t2)}
.fc-prog{background:var(--sf);border-radius:var(--rr);padding:10px 12px;border:1px solid var(--bd)}
.fc-prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:6px}
.pbg{background:var(--bd);border-radius:99px;height:5px}
.pf{background:var(--p);border-radius:99px;height:5px;transition:width .3s}
.fc-scene{perspective:1000px;height:220px;cursor:pointer}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s}
.fc-scene.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--rr);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border:1.5px solid var(--bd);background:var(--sf)}
.fc-back{transform:rotateY(180deg);background:var(--pl);border-color:var(--p)}
.fc-word{font-size:52px;font-weight:700;margin-bottom:6px;line-height:1}
.fc-hint{font-size:13px;color:var(--t2)}
.fc-tap{font-size:11px;color:var(--t3);margin-top:10px}
.fc-ans{font-size:22px;font-weight:600;color:var(--p);margin-bottom:4px}
.fc-ans2{font-size:14px;color:var(--pd)}
.fc-ans3{font-size:12px;color:var(--pd);margin-top:2px}
.fc-btns{display:flex;gap:8px}
.fc-btn{flex:1;padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:600;cursor:pointer}
.fc-btn.wrong{background:var(--rl);color:#dc2626}
.fc-btn.correct{background:var(--gl);color:#15803d}
.fc-done{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);padding:28px 16px;text-align:center}
.fc-score{font-size:48px;font-weight:700;color:var(--p)}
.fc-score-lbl{font-size:14px;color:var(--t2);margin-top:4px;margin-bottom:18px}
/* QUIZ */
.qz-wrap{padding:10px 10px;display:flex;flex-direction:column;gap:10px;min-height:calc(100vh - 190px)}
.qz-ctrl{background:var(--sf);border-radius:var(--rr);padding:10px 12px;border:1px solid var(--bd)}
.qz-type-row{display:flex;gap:6px;margin-bottom:8px}
.qz-type-btn{flex:1;padding:8px 4px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);text-align:center}
.qz-type-btn.active{background:var(--pl);border-color:var(--p);color:var(--p)}
.qz-prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.qz-card{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);padding:20px 14px;text-align:center}
.qz-word{font-size:44px;font-weight:700;margin-bottom:4px;line-height:1.2}
.qz-sub{font-size:12px;color:var(--t2);margin-bottom:16px}
.qz-hint{font-size:12px;color:var(--t2);margin-bottom:16px}
.qz-choices{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qz-ch{padding:11px 8px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);font-size:13px;font-weight:500;cursor:pointer;text-align:center;line-height:1.3}
.qz-ch:active{transform:scale(.97)}
.qz-ch.ok{background:var(--gl);border-color:var(--g);color:#15803d}
.qz-ch.ng{background:var(--rl);border-color:var(--r);color:#dc2626}
.qz-next{margin-top:10px;width:100%;padding:12px;border-radius:var(--rs);background:var(--p);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;display:none}
/* FILL */
.fill-card{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);padding:16px 14px}
.fill-sent{font-size:18px;line-height:1.8;margin-bottom:10px;color:var(--t1)}
.fill-blank{display:inline-block;border-bottom:2px solid var(--p);min-width:60px;text-align:center;font-weight:700;color:var(--p);padding:0 4px}
.fill-opts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.fill-opt{padding:7px 14px;border-radius:99px;border:1.5px solid var(--bd);background:var(--sf);font-size:14px;cursor:pointer;font-weight:500}
.fill-opt:active{transform:scale(.96)}
.fill-opt.ok{background:var(--gl);border-color:var(--g);color:#15803d}
.fill-opt.ng{background:var(--rl);border-color:var(--r);color:#dc2626}
.fill-exp{font-size:12px;color:var(--t2);margin-top:6px;padding:8px;background:var(--bg);border-radius:var(--rs);display:none}
/* BUILD */
.build-card{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);padding:14px}
.build-target{font-size:14px;color:var(--t2);margin-bottom:10px;font-style:italic}
.build-answer{min-height:48px;border:2px dashed var(--bd);border-radius:var(--rs);padding:8px 10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.build-answer.ok{border-color:var(--g);background:var(--gl)}
.build-answer.ng{border-color:var(--r);background:var(--rl)}
.build-word{padding:6px 10px;background:var(--p);color:#fff;border-radius:99px;font-size:14px;cursor:pointer;font-weight:500}
.build-word.used{background:var(--t3)}
.build-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pool-word{padding:6px 12px;border:1.5px solid var(--p);color:var(--p);border-radius:99px;font-size:14px;cursor:pointer;font-weight:500;background:var(--pl)}
.pool-word.used{opacity:.3;pointer-events:none}
.build-btns{display:flex;gap:7px}
.build-btn{flex:1;padding:9px;border-radius:var(--rs);border:1.5px solid var(--bd);font-size:13px;font-weight:500;cursor:pointer;background:var(--sf);color:var(--t2)}
.build-btn.check{background:var(--p);color:#fff;border-color:var(--p)}
/* RESULT */
.qz-result{background:var(--sf);border-radius:var(--rr);border:1.5px solid var(--bd);padding:28px 14px;text-align:center}
.qz-score{font-size:48px;font-weight:700;color:var(--p)}
.qz-score-lbl{font-size:14px;color:var(--t2);margin:4px 0 18px}
.restart-btn{padding:11px 28px;border-radius:var(--rs);background:var(--p);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer}
/* HAFAL TAB */
.hafal-list{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
/* EMPTY */
.empty{text-align:center;padding:40px 16px;color:var(--t2);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:8px}
/* INSTALL */
.inst-banner{background:var(--p);color:#fff;padding:10px 12px;display:flex;align-items:center;gap:8px}
.inst-banner p{flex:1;font-size:12px;line-height:1.4}
.inst-btn{background:#fff;color:var(--p);border:none;border-radius:var(--rs);padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.inst-x{background:none;border:none;color:#fff;font-size:16px;cursor:pointer;opacity:.7;flex-shrink:0}
/* DARK */
@media(prefers-color-scheme:dark){
  :root{--bg:#0f0f17;--sf:#1a1a2e;--bd:#2d2d44;--t1:#f1f0ff;--t2:#9d9cb5;--t3:#6b6a80;--pl:#2d2b5a;--gl:#052e16;--rl:#2d0a0a;--bl:#0c1a3d;--al:#2d1a00}
  .search-wrap input{background:rgba(255,255,255,.12);color:#fff}
  .search-wrap input::placeholder{color:rgba(255,255,255,.45)}
  .fc-back{background:#2d2b5a;border-color:var(--p)}
}
</style>
</head>
<body>
<div id="inst-banner" style="display:none" class="inst-banner">
  <p>📲 Install aplikasi ini di HP untuk akses offline!</p>
  <button class="inst-btn" onclick="installApp()">Install</button>
  <button class="inst-x" onclick="document.getElementById('inst-banner').style.display='none'">✕</button>
</div>

<div class="topbar">
  <div class="tb1">
    <div><div class="app-title">🇯🇵 日本語 Kosakata</div><div class="app-sub">N5 · N4 Lengkap</div></div>
    <div class="stats-pill" id="stats-pill">0 kata</div>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Cari kanji, romaji, atau Indonesia..." oninput="onSearch()">
    <button class="sc" id="sc" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="setTab('browse')">📚 Jelajahi</div>
  <div class="tab" onclick="setTab('flash')">🃏 Flashcard</div>
  <div class="tab" onclick="setTab('quiz')">🧠 Kuis</div>
  <div class="tab" onclick="setTab('particle')">🔡 Partikel</div>
  <div class="tab" onclick="setTab('build')">✍️ Kalimat</div>
  <div class="tab" onclick="setTab('hafal')">✅ Hafal (<span id="hc">0</span>)</div>
</div>

<div class="filters" id="filters">
  <div class="chip active" onclick="setF('level','semua')">Semua</div>
  <div class="chip" onclick="setF('level','N5')">N5</div>
  <div class="chip" onclick="setF('level','N4')">N4</div>
  <div class="divchip"></div>
  <div class="chip active" onclick="setF('jenis','semua')">Semua Jenis</div>
  <div class="chip" onclick="setF('jenis','v')">Kata Kerja</div>
  <div class="chip" onclick="setF('jenis','n')">Kata Benda</div>
  <div class="chip" onclick="setF('jenis','adj')">Kata Sifat</div>
  <div class="chip" onclick="setF('jenis','adv')">Keterangan</div>
  <div class="chip" onclick="setF('jenis','expr')">Ekspresi</div>
  <div class="divchip"></div>
  <div class="chip ck" onclick="setF('kaiwa','t')">🗣 Kaiwa</div>
</div>

<div id="browse-tab"><div class="list" id="list"></div></div>
<div id="flash-tab" style="display:none"></div>
<div id="quiz-tab" style="display:none"></div>
<div id="particle-tab" style="display:none"></div>
<div id="build-tab" style="display:none"></div>
<div id="hafal-tab" style="display:none"><div class="hafal-list" id="hafal-list"></div></div>

<script>

const V=[

{k:"会う",h:"あう",r:"au",id:"Bertemu",j:"v",lv:"N5",kw:1,s:{jp:"駅で友達に会いました。",h:"えきでともだちにあいました。",r:"Eki de tomodachi ni aimashita.",i:"Saya bertemu teman di stasiun."},d:[{sp:"A",jp:"昨日、田中さんに会いましたか？",h:"きのう、たなかさんにあいましたか？",r:"Kinō, Tanaka-san ni aimashita ka?",i:"Kemarin, kamu bertemu Pak Tanaka?"},{sp:"B",jp:"はい、図書館で会いました。",h:"はい、としょかんであいました。",r:"Hai, toshokan de aimashita.",i:"Iya, kami bertemu di perpustakaan."}]},
{k:"開く",h:"あく",r:"aku",id:"Terbuka",j:"v",lv:"N5",kw:0,s:{jp:"ドアが自動で開きます。",h:"ドアがじどうであきます。",r:"Doa ga jidō de akimasu.",i:"Pintu terbuka secara otomatis."},d:[{sp:"A",jp:"この窓は開きますか？",h:"このまどはあきますか？",r:"Kono mado wa akimasu ka?",i:"Apakah jendela ini bisa terbuka?"},{sp:"B",jp:"右に引くと開きますよ。",h:"みぎにひくとあきますよ。",r:"Migi ni hiku to akimasu yo.",i:"Tarik ke kanan maka akan terbuka."}]},
{k:"開ける",h:"あける",r:"akeru",id:"Membuka",j:"v",lv:"N5",kw:1,s:{jp:"毎朝、窓を開けます。",h:"まいあさ、まどをあけます。",r:"Maiasa, mado o akemasu.",i:"Setiap pagi saya membuka jendela."},d:[{sp:"A",jp:"窓を開けてもいいですか？",h:"まどをあけてもいいですか？",r:"Mado o akete mo ii desu ka?",i:"Boleh saya buka jendelanya?"},{sp:"B",jp:"もちろん、開けてください。",h:"もちろん、あけてください。",r:"Mochiron, akete kudasai.",i:"Tentu saja, tolong dibuka."}]},
{k:"あげる",h:"あげる",r:"ageru",id:"Memberi",j:"v",lv:"N5",kw:1,s:{jp:"誕生日に花をあげました。",h:"たんじょうびにはなをあげました。",r:"Tanjōbi ni hana o agemashita.",i:"Saya memberi bunga di hari ulang tahunnya."},d:[{sp:"A",jp:"山田さんに何をあげますか？",h:"やまださんになにをあげますか？",r:"Yamada-san ni nani o agemasu ka?",i:"Mau memberi apa kepada Yamada-san?"},{sp:"B",jp:"ケーキをあげようと思います。",h:"ケーキをあげようとおもいます。",r:"Kēki o ageyō to omoimasu.",i:"Saya pikir akan memberi kue."}]},
{k:"遊ぶ",h:"あそぶ",r:"asobu",id:"Bermain",j:"v",lv:"N5",kw:1,s:{jp:"子供たちは公園で遊んでいます。",h:"こどもたちはこうえんであそんでいます。",r:"Kodomotachi wa kōen de asonde imasu.",i:"Anak-anak sedang bermain di taman."},d:[{sp:"A",jp:"週末、一緒に遊びませんか？",h:"しゅうまつ、いっしょにあそびませんか？",r:"Shūmatsu, issho ni asobimasen ka?",i:"Akhir pekan, mau bermain bersama?"},{sp:"B",jp:"いいですね！どこで遊びましょうか？",h:"いいですね！どこであそびましょうか？",r:"Ii desu ne! Doko de asobimashō ka?",i:"Bagus! Kita bermain di mana ya?"}]},
{k:"洗う",h:"あらう",r:"arau",id:"Mencuci",j:"v",lv:"N5",kw:1,s:{jp:"食事の前に手を洗います。",h:"しょくじのまえにてをあらいます。",r:"Shokuji no mae ni te o araimasu.",i:"Saya mencuci tangan sebelum makan."},d:[{sp:"A",jp:"手を洗いましたか？",h:"てをあらいましたか？",r:"Te o araimashita ka?",i:"Sudah cuci tangan?"},{sp:"B",jp:"はい、今洗いました。",h:"はい、いまあらいました。",r:"Hai, ima araimashita.",i:"Sudah, baru saja cuci."}]},
{k:"ある",h:"ある",r:"aru",id:"Ada (benda/hal)",j:"v",lv:"N5",kw:1,s:{jp:"机の上に本があります。",h:"つくえのうえにほんがあります。",r:"Tsukue no ue ni hon ga arimasu.",i:"Ada buku di atas meja."},d:[{sp:"A",jp:"近くにコンビニがありますか？",h:"ちかくにコンビニがありますか？",r:"Chikaku ni konbini ga arimasu ka?",i:"Apakah ada konbini di dekat sini?"},{sp:"B",jp:"はい、駅の前にありますよ。",h:"はい、えきのまえにありますよ。",r:"Hai, eki no mae ni arimasu yo.",i:"Iya, ada di depan stasiun."}]},
{k:"歩く",h:"あるく",r:"aruku",id:"Berjalan",j:"v",lv:"N5",kw:1,s:{jp:"毎日、駅まで歩きます。",h:"まいにち、えきまであるきます。",r:"Mainichi, eki made arukimasu.",i:"Setiap hari saya berjalan ke stasiun."},d:[{sp:"A",jp:"駅まで歩いて何分かかりますか？",h:"えきまであるいてなんぷんかかりますか？",r:"Eki made aruite nanpun kakarimasu ka?",i:"Berapa menit jalan kaki ke stasiun?"},{sp:"B",jp:"だいたい十分かかります。",h:"だいたいじゅっぷんかかります。",r:"Daitai juppun kakarimasu.",i:"Kira-kira 10 menit."}]},
{k:"言う",h:"いう",r:"iu",id:"Berkata",j:"v",lv:"N5",kw:1,s:{jp:"先生は「よくできました」と言いました。",h:"せんせいは「よくできました」といいました。",r:"Sensei wa 'yoku dekimashita' to iimashita.",i:"Guru berkata 'sudah bagus'."},d:[{sp:"A",jp:"彼は何と言いましたか？",h:"かれはなんといいましたか？",r:"Kare wa nan to iimashita ka?",i:"Dia bilang apa?"},{sp:"B",jp:"「また来ます」と言いました。",h:"「またきます」といいました。",r:"'Mata kimasu' to iimashita.",i:"Dia bilang 'saya akan datang lagi'."}]},
{k:"行く",h:"いく",r:"iku",id:"Pergi",j:"v",lv:"N5",kw:1,s:{jp:"明日、学校へ行きます。",h:"あした、がっこうへいきます。",r:"Ashita, gakkō e ikimasu.",i:"Besok saya pergi ke sekolah."},d:[{sp:"A",jp:"今日、どこへ行きますか？",h:"きょう、どこへいきますか？",r:"Kyō, doko e ikimasu ka?",i:"Hari ini kamu pergi ke mana?"},{sp:"B",jp:"スーパーへ行きます。",h:"スーパーへいきます。",r:"Sūpā e ikimasu.",i:"Saya pergi ke supermarket."}]},
{k:"いる",h:"いる",r:"iru",id:"Ada (orang/hewan)",j:"v",lv:"N5",kw:1,s:{jp:"リビングに猫がいます。",h:"リビングにねこがいます。",r:"Ribingu ni neko ga imasu.",i:"Ada kucing di ruang tamu."},d:[{sp:"A",jp:"お母さんは家にいますか？",h:"おかあさんはいえにいますか？",r:"Okāsan wa ie ni imasu ka?",i:"Apakah ibu ada di rumah?"},{sp:"B",jp:"いいえ、今、外にいます。",h:"いいえ、いま、そとにいます。",r:"Iie, ima, soto ni imasu.",i:"Tidak, sekarang beliau di luar."}]},
{k:"入れる",h:"いれる",r:"ireru",id:"Memasukkan",j:"v",lv:"N5",kw:1,s:{jp:"バッグに財布を入れました。",h:"バッグにさいふをいれました。",r:"Baggu ni saifu o iremashita.",i:"Saya memasukkan dompet ke dalam tas."},d:[{sp:"A",jp:"砂糖をコーヒーに入れますか？",h:"さとうをコーヒーにいれますか？",r:"Satō o kōhī ni iremasu ka?",i:"Masukkan gula ke kopi?"},{sp:"B",jp:"いいえ、砂糖は入れません。",h:"いいえ、さとうはいれません。",r:"Iie, satō wa iremasen.",i:"Tidak, saya tidak masukkan gula."}]},
{k:"歌う",h:"うたう",r:"utau",id:"Bernyanyi",j:"v",lv:"N5",kw:1,s:{jp:"カラオケで歌を歌いました。",h:"カラオケでうたをうたいました。",r:"Karaoke de uta o utaimashita.",i:"Saya bernyanyi di karaoke."},d:[{sp:"A",jp:"カラオケで何を歌いますか？",h:"カラオケでなにをうたいますか？",r:"Karaoke de nani o utaimasu ka?",i:"Kamu menyanyikan apa di karaoke?"},{sp:"B",jp:"日本語の歌をよく歌います。",h:"にほんごのうたをよくうたいます。",r:"Nihongo no uta o yoku utaimasu.",i:"Saya sering menyanyikan lagu Jepang."}]},
{k:"売る",h:"うる",r:"uru",id:"Menjual",j:"v",lv:"N5",kw:0,s:{jp:"このお店では野菜を売っています。",h:"このおみせではやさいをうっています。",r:"Kono omise de wa yasai o utte imasu.",i:"Toko ini menjual sayuran."},d:[{sp:"A",jp:"この自転車を売りたいんですが。",h:"このじてんしゃをうりたいんですが。",r:"Kono jitensha o uritain desu ga.",i:"Saya ingin menjual sepeda ini."},{sp:"B",jp:"いくらで売りますか？",h:"いくらでうりますか？",r:"Ikura de urimasu ka?",i:"Kamu jual berapa?"}]},
{k:"起きる",h:"おきる",r:"okiru",id:"Bangun/Terjadi",j:"v",lv:"N5",kw:1,s:{jp:"毎朝六時に起きます。",h:"まいあさろくじにおきます。",r:"Maiasa rokuji ni okimasu.",i:"Setiap pagi saya bangun pukul enam."},d:[{sp:"A",jp:"何時に起きますか？",h:"なんじにおきますか？",r:"Nanji ni okimasu ka?",i:"Kamu bangun jam berapa?"},{sp:"B",jp:"いつもは七時に起きます。",h:"いつもはしちじにおきます。",r:"Itsumo wa shichiji ni okimasu.",i:"Biasanya bangun jam 7."}]},
{k:"置く",h:"おく",r:"oku",id:"Meletakkan",j:"v",lv:"N5",kw:1,s:{jp:"鍵をテーブルの上に置きました。",h:"かぎをテーブルのうえにおきました。",r:"Kagi o tēburu no ue ni okimashita.",i:"Saya meletakkan kunci di atas meja."},d:[{sp:"A",jp:"荷物をどこに置けばいいですか？",h:"にもつをどこにおけばいいですか？",r:"Nimotsu o doko ni okeba ii desu ka?",i:"Barang bawaan ditaruh di mana?"},{sp:"B",jp:"ここに置いてください。",h:"ここにおいてください。",r:"Koko ni oite kudasai.",i:"Tolong letakkan di sini."}]},
{k:"送る",h:"おくる",r:"okuru",id:"Mengirim",j:"v",lv:"N5",kw:1,s:{jp:"友達にメールを送りました。",h:"ともだちにメールをおくりました。",r:"Tomodachi ni mēru o okurimashita.",i:"Saya mengirim email kepada teman."},d:[{sp:"A",jp:"この荷物を東京に送りたいんですが。",h:"このにもつをとうきょうにおくりたいんですが。",r:"Kono nimotsu o Tōkyō ni okuritain desu ga.",i:"Saya ingin kirim paket ini ke Tokyo."},{sp:"B",jp:"明日届くように送ります。",h:"あしたとどくようにおくります。",r:"Ashita todoku yō ni okurimasu.",i:"Akan dikirim agar tiba besok."}]},
{k:"覚える",h:"おぼえる",r:"oboeru",id:"Menghafal",j:"v",lv:"N5",kw:1,s:{jp:"毎日漢字を十個覚えます。",h:"まいにちかんじをじゅっこおぼえます。",r:"Mainichi kanji o jukko oboemasu.",i:"Setiap hari saya hafal 10 kanji."},d:[{sp:"A",jp:"この単語を覚えましたか？",h:"このたんごをおぼえましたか？",r:"Kono tango o oboemashita ka?",i:"Sudah hafal kata ini?"},{sp:"B",jp:"まだ覚えていません。",h:"まだおぼえていません。",r:"Mada oboete imasen.",i:"Belum hafal."}]},
{k:"泳ぐ",h:"およぐ",r:"oyogu",id:"Berenang",j:"v",lv:"N5",kw:0,s:{jp:"夏はプールで泳ぎます。",h:"なつはプールでおよぎます。",r:"Natsu wa pūru de oyogimasu.",i:"Di musim panas saya berenang di kolam."},d:[{sp:"A",jp:"泳げますか？",h:"およげますか？",r:"Oyogemasu ka?",i:"Bisa berenang?"},{sp:"B",jp:"はい、でも速くは泳げません。",h:"はい、でもはやくはおよげません。",r:"Hai, demo hayaku wa oyogemasen.",i:"Bisa, tapi tidak bisa cepat."}]},
{k:"降りる",h:"おりる",r:"oriru",id:"Turun (kendaraan)",j:"v",lv:"N5",kw:1,s:{jp:"次の駅で電車を降ります。",h:"つぎのえきでんしゃをおります。",r:"Tsugi no eki de densha o orimasu.",i:"Saya turun kereta di stasiun berikutnya."},d:[{sp:"A",jp:"どこで降りますか？",h:"どこでおりますか？",r:"Doko de orimasu ka?",i:"Turun di mana?"},{sp:"B",jp:"渋谷で降ります。",h:"しぶやでおります。",r:"Shibuya de orimasu.",i:"Turun di Shibuya."}]},
{k:"終わる",h:"おわる",r:"owaru",id:"Berakhir",j:"v",lv:"N5",kw:1,s:{jp:"授業は三時に終わります。",h:"じゅぎょうはさんじにおわります。",r:"Jugyō wa sanji ni owarimasu.",i:"Pelajaran berakhir pukul tiga."},d:[{sp:"A",jp:"映画は何時に終わりますか？",h:"えいがはなんじにおわりますか？",r:"Eiga wa nanji ni owarimasu ka?",i:"Film berakhir jam berapa?"},{sp:"B",jp:"九時ごろに終わります。",h:"くじごろにおわります。",r:"Kuji goro ni owarimasu.",i:"Sekitar jam 9 berakhir."}]},
{k:"買う",h:"かう",r:"kau",id:"Membeli",j:"v",lv:"N5",kw:1,s:{jp:"スーパーで野菜を買いました。",h:"スーパーでやさいをかいました。",r:"Sūpā de yasai o kaimashita.",i:"Saya membeli sayuran di supermarket."},d:[{sp:"A",jp:"新しいスマホを買いたいんですが。",h:"あたらしいスマホをかいたいんですが。",r:"Atarashii sumaho o kaitain desu ga.",i:"Saya ingin membeli smartphone baru."},{sp:"B",jp:"どんなスマホを買うつもりですか？",h:"どんなスマホをかうつもりですか？",r:"Donna sumaho o kau tsumori desu ka?",i:"Smartphone seperti apa yang mau dibeli?"}]},
{k:"帰る",h:"かえる",r:"kaeru",id:"Pulang",j:"v",lv:"N5",kw:1,s:{jp:"仕事が終わったら家に帰ります。",h:"しごとがおわったらいえにかえります。",r:"Shigoto ga owattara ie ni kaerimasu.",i:"Kalau pekerjaan selesai saya pulang."},d:[{sp:"A",jp:"何時に帰りますか？",h:"なんじにかえりますか？",r:"Nanji ni kaerimasu ka?",i:"Kamu pulang jam berapa?"},{sp:"B",jp:"今日は早く帰れると思います。",h:"きょうははやくかえれるとおもいます。",r:"Kyō wa hayaku kaereru to omoimasu.",i:"Hari ini sepertinya bisa pulang lebih awal."}]},
{k:"かかる",h:"かかる",r:"kakaru",id:"Membutuhkan (waktu/biaya)",j:"v",lv:"N5",kw:1,s:{jp:"駅まで歩いて十分かかります。",h:"えきまであるいてじゅっぷんかかります。",r:"Eki made aruite juppun kakarimasu.",i:"Butuh 10 menit jalan kaki ke stasiun."},d:[{sp:"A",jp:"この修理にはいくらかかりますか？",h:"このしゅうりにはいくらかかりますか？",r:"Kono shūri ni wa ikura kakarimasu ka?",i:"Berapa biaya perbaikan ini?"},{sp:"B",jp:"だいたい五千円かかります。",h:"だいたいごせんえんかかります。",r:"Daitai gosen-en kakarimasu.",i:"Kira-kira 5000 yen."}]},
{k:"書く",h:"かく",r:"kaku",id:"Menulis",j:"v",lv:"N5",kw:1,s:{jp:"日記を毎日書いています。",h:"にっきをまいにちかいています。",r:"Nikki o mainichi kaite imasu.",i:"Saya menulis buku harian setiap hari."},d:[{sp:"A",jp:"ここに名前を書いてください。",h:"ここになまえをかいてください。",r:"Koko ni namae o kaite kudasai.",i:"Tolong tulis nama Anda di sini."},{sp:"B",jp:"漢字で書いてもいいですか？",h:"かんじでかいてもいいですか？",r:"Kanji de kaite mo ii desu ka?",i:"Boleh saya tulis dengan kanji?"}]},
{k:"貸す",h:"かす",r:"kasu",id:"Meminjamkan",j:"v",lv:"N5",kw:1,s:{jp:"友達に傘を貸しました。",h:"ともだちにかさをかしました。",r:"Tomodachi ni kasa o kashimashita.",i:"Saya meminjamkan payung kepada teman."},d:[{sp:"A",jp:"消しゴムを貸してもらえますか？",h:"けしゴムをかしてもらえますか？",r:"Keshigomu o kashite moraemasu ka?",i:"Bisa pinjamkan penghapusnya?"},{sp:"B",jp:"もちろん、どうぞ。",h:"もちろん、どうぞ。",r:"Mochiron, dōzo.",i:"Tentu saja, silakan."}]},
{k:"借りる",h:"かりる",r:"kariru",id:"Meminjam",j:"v",lv:"N5",kw:1,s:{jp:"図書館で本を借りました。",h:"としょかんでほんをかりました。",r:"Toshokan de hon o karimashita.",i:"Saya meminjam buku di perpustakaan."},d:[{sp:"A",jp:"少しお金を借りてもいいですか？",h:"すこしおかねをかりてもいいですか？",r:"Sukoshi okane o karite mo ii desu ka?",i:"Boleh saya pinjam sedikit uang?"},{sp:"B",jp:"いいですよ。いくら借りますか？",h:"いいですよ。いくらかりますか？",r:"Ii desu yo. Ikura karimasu ka?",i:"Boleh. Mau pinjam berapa?"}]},
{k:"聞く",h:"きく",r:"kiku",id:"Mendengar/Bertanya",j:"v",lv:"N5",kw:1,s:{jp:"音楽を聞きながら勉強します。",h:"おんがくをききながらべんきょうします。",r:"Ongaku o kikinagara benkyō shimasu.",i:"Saya belajar sambil mendengarkan musik."},d:[{sp:"A",jp:"先生に聞いてみましたか？",h:"せんせいにきいてみましたか？",r:"Sensei ni kiite mimashita ka?",i:"Sudah coba bertanya ke guru?"},{sp:"B",jp:"まだです。これから聞きます。",h:"まだです。これからききます。",r:"Mada desu. Korekara kikimasu.",i:"Belum. Sekarang mau bertanya."}]},
{k:"来る",h:"くる",r:"kuru",id:"Datang",j:"v",lv:"N5",kw:1,s:{jp:"友達が家に来ました。",h:"ともだちがいえにきました。",r:"Tomodachi ga ie ni kimashita.",i:"Teman datang ke rumah saya."},d:[{sp:"A",jp:"明日、パーティーに来ますか？",h:"あした、パーティーにきますか？",r:"Ashita, pātī ni kimasu ka?",i:"Besok, kamu datang ke pesta?"},{sp:"B",jp:"はい、六時ごろ来ます。",h:"はい、ろくじごろきます。",r:"Hai, rokuji goro kimasu.",i:"Iya, datang sekitar jam 6."}]},
{k:"消す",h:"けす",r:"kesu",id:"Menghapus/Mematikan",j:"v",lv:"N5",kw:1,s:{jp:"電気を消してください。",h:"でんきをけしてください。",r:"Denki o keshite kudasai.",i:"Tolong matikan lampunya."},d:[{sp:"A",jp:"電気を消してもいいですか？",h:"でんきをけしてもいいですか？",r:"Denki o keshite mo ii desu ka?",i:"Boleh saya matikan lampunya?"},{sp:"B",jp:"はい、消してください。",h:"はい、けしてください。",r:"Hai, keshite kudasai.",i:"Boleh, tolong dimatikan."}]},
{k:"知る",h:"しる",r:"shiru",id:"Tahu/Mengetahui",j:"v",lv:"N5",kw:1,s:{jp:"彼女の住所を知っています。",h:"かのじょのじゅうしょをしっています。",r:"Kanojo no jūsho o shitte imasu.",i:"Saya tahu alamat rumahnya."},d:[{sp:"A",jp:"近くに郵便局があるか知っていますか？",h:"ちかくにゆうびんきょくがあるかしっていますか？",r:"Chikaku ni yūbinkyoku ga aru ka shitte imasu ka?",i:"Apakah kamu tahu ada kantor pos di dekat sini?"},{sp:"B",jp:"すみません、知りません。",h:"すみません、しりません。",r:"Sumimasen, shirimasen.",i:"Maaf, saya tidak tahu."}]},
{k:"住む",h:"すむ",r:"sumu",id:"Bertempat tinggal",j:"v",lv:"N5",kw:1,s:{jp:"今、東京に住んでいます。",h:"いま、とうきょうにすんでいます。",r:"Ima, Tōkyō ni sunde imasu.",i:"Sekarang saya tinggal di Tokyo."},d:[{sp:"A",jp:"どこに住んでいますか？",h:"どこにすんでいますか？",r:"Doko ni sunde imasu ka?",i:"Kamu tinggal di mana?"},{sp:"B",jp:"ジャカルタに住んでいます。",h:"ジャカルタにすんでいます。",r:"Jakaruta ni sunde imasu.",i:"Saya tinggal di Jakarta."}]},
{k:"する",h:"する",r:"suru",id:"Melakukan",j:"v",lv:"N5",kw:1,s:{jp:"毎朝、運動をします。",h:"まいあさ、うんどうをします。",r:"Maiasa, undō o shimasu.",i:"Setiap pagi saya berolahraga."},d:[{sp:"A",jp:"週末は何をしますか？",h:"しゅうまつはなにをしますか？",r:"Shūmatsu wa nani o shimasu ka?",i:"Akhir pekan mau ngapain?"},{sp:"B",jp:"買い物をしようと思っています。",h:"かいものをしようとおもっています。",r:"Kaimono o shiyō to omotte imasu.",i:"Saya berencana belanja."}]},
{k:"食べる",h:"たべる",r:"taberu",id:"Makan",j:"v",lv:"N5",kw:1,s:{jp:"朝ごはんにパンを食べます。",h:"あさごはんにパンをたべます。",r:"Asagohan ni pan o tabemasu.",i:"Saya makan roti untuk sarapan."},d:[{sp:"A",jp:"昼ごはんは何を食べましたか？",h:"ひるごはんはなにをたべましたか？",r:"Hirugohan wa nani o tabemashita ka?",i:"Tadi siang makan apa?"},{sp:"B",jp:"ラーメンを食べました！おいしかったです！",h:"ラーメンをたべました！おいしかったです！",r:"Rāmen o tabemashita! Oishikatta desu!",i:"Makan ramen! Enak sekali!"}]},
{k:"使う",h:"つかう",r:"tsukau",id:"Menggunakan",j:"v",lv:"N5",kw:1,s:{jp:"毎日スマホを使います。",h:"まいにちスマホをつかいます。",r:"Mainichi sumaho o tsukaimasu.",i:"Saya menggunakan smartphone setiap hari."},d:[{sp:"A",jp:"このパソコンを使ってもいいですか？",h:"このパソコンをつかってもいいですか？",r:"Kono pasokon o tsukatte mo ii desu ka?",i:"Boleh saya gunakan komputer ini?"},{sp:"B",jp:"どうぞ、使ってください。",h:"どうぞ、つかってください。",r:"Dōzo, tsukatte kudasai.",i:"Silakan, gunakan saja."}]},
{k:"作る",h:"つくる",r:"tsukuru",id:"Membuat",j:"v",lv:"N5",kw:1,s:{jp:"母が夕食を作っています。",h:"ははがゆうしょくをつくっています。",r:"Haha ga yūshoku o tsukutte imasu.",i:"Ibu sedang membuat makan malam."},d:[{sp:"A",jp:"料理は自分で作りますか？",h:"りょうりはじぶんでつくりますか？",r:"Ryōri wa jibun de tsukurimasu ka?",i:"Apakah kamu memasak sendiri?"},{sp:"B",jp:"はい、毎日作るようにしています。",h:"はい、まいにちつくるようにしています。",r:"Hai, mainichi tsukuru yō ni shite imasu.",i:"Iya, saya berusaha memasak setiap hari."}]},
{k:"出来る",h:"できる",r:"dekiru",id:"Bisa",j:"v",lv:"N5",kw:1,s:{jp:"日本語で話すことができます。",h:"にほんごではなすことができます。",r:"Nihongo de hanasu koto ga dekimasu.",i:"Saya bisa berbicara dalam bahasa Jepang."},d:[{sp:"A",jp:"漢字が読めますか？",h:"かんじがよめますか？",r:"Kanji ga yomemasu ka?",i:"Bisa baca kanji?"},{sp:"B",jp:"少しはできますが、まだ難しいです。",h:"すこしはできますが、まだむずかしいです。",r:"Sukoshi wa dekimasu ga, mada muzukashii desu.",i:"Bisa sedikit, tapi masih sulit."}]},
{k:"出る",h:"でる",r:"deru",id:"Keluar",j:"v",lv:"N5",kw:1,s:{jp:"朝八時に家を出ます。",h:"あさはちじにいえをでます。",r:"Asa hachiji ni ie o demasu.",i:"Saya keluar dari rumah pukul 8 pagi."},d:[{sp:"A",jp:"何時に家を出ますか？",h:"なんじにいえをでますか？",r:"Nanji ni ie o demasu ka?",i:"Kamu keluar rumah jam berapa?"},{sp:"B",jp:"七時半に出るつもりです。",h:"しちじはんにでるつもりです。",r:"Shichiji han ni deru tsumori desu.",i:"Saya berencana keluar jam setengah delapan."}]},
{k:"止まる",h:"とまる",r:"tomaru",id:"Berhenti",j:"v",lv:"N5",kw:1,s:{jp:"バスは駅の前で止まります。",h:"バスはえきのまえでとまります。",r:"Basu wa eki no mae de tomarimasu.",i:"Bus berhenti di depan stasiun."},d:[{sp:"A",jp:"次のバス停で止まりますか？",h:"つぎのバスていでとまりますか？",r:"Tsugi no basutei de tomarimasu ka?",i:"Apakah berhenti di halte berikutnya?"},{sp:"B",jp:"はい、あそこで止まりますよ。",h:"はい、あそこでとまりますよ。",r:"Hai, asoko de tomarimasu yo.",i:"Iya, berhenti di sana."}]},
{k:"取る",h:"とる",r:"toru",id:"Mengambil",j:"v",lv:"N5",kw:1,s:{jp:"棚から本を取りました。",h:"たなからほんをとりました。",r:"Tana kara hon o torimashita.",i:"Saya mengambil buku dari rak."},d:[{sp:"A",jp:"塩を取ってもらえますか？",h:"しおをとってもらえますか？",r:"Shio o totte moraemasu ka?",i:"Bisa tolong ambilkan garamnya?"},{sp:"B",jp:"はい、どうぞ。",h:"はい、どうぞ。",r:"Hai, dōzo.",i:"Ini, silakan."}]},
{k:"なる",h:"なる",r:"naru",id:"Menjadi",j:"v",lv:"N5",kw:1,s:{jp:"将来、医者になりたいです。",h:"しょうらい、いしゃになりたいです。",r:"Shōrai, isha ni naritai desu.",i:"Di masa depan saya ingin menjadi dokter."},d:[{sp:"A",jp:"大きくなったら何になりたいですか？",h:"おおきくなったらなになりたいですか？",r:"Ōkiku nattara nani ni naritai desu ka?",i:"Kalau sudah besar mau jadi apa?"},{sp:"B",jp:"エンジニアになりたいと思っています。",h:"エンジニアになりたいとおもっています。",r:"Enjinia ni naritai to omotte imasu.",i:"Saya berpikir ingin menjadi insinyur."}]},
{k:"寝る",h:"ねる",r:"neru",id:"Tidur",j:"v",lv:"N5",kw:1,s:{jp:"毎晩十一時に寝ます。",h:"まいばんじゅういちじにねます。",r:"Maiban jūichiji ni nemasu.",i:"Setiap malam saya tidur pukul sebelas."},d:[{sp:"A",jp:"昨日何時に寝ましたか？",h:"きのうなんじにねましたか？",r:"Kinō nanji ni nemashita ka?",i:"Kemarin kamu tidur jam berapa?"},{sp:"B",jp:"遅くて、一時ごろ寝ました。",h:"おそくて、いちじごろねました。",r:"Osokute, ichiji goro nemashita.",i:"Kemalaman, tidur sekitar jam 1."}]},
{k:"飲む",h:"のむ",r:"nomu",id:"Minum",j:"v",lv:"N5",kw:1,s:{jp:"毎朝、コーヒーを飲みます。",h:"まいあさ、コーヒーをのみます。",r:"Maiasa, kōhī o nomimasu.",i:"Setiap pagi saya minum kopi."},d:[{sp:"A",jp:"何か飲みますか？",h:"なにかのみますか？",r:"Nanika nomimasu ka?",i:"Mau minum sesuatu?"},{sp:"B",jp:"お茶をいただけますか？",h:"おちゃをいただけますか？",r:"Ocha o itadakemasu ka?",i:"Boleh saya minta teh?"}]},
{k:"乗る",h:"のる",r:"noru",id:"Naik (kendaraan)",j:"v",lv:"N5",kw:1,s:{jp:"毎日電車に乗って学校へ行きます。",h:"まいにちでんしゃにのってがっこうへいきます。",r:"Mainichi densha ni notte gakkō e ikimasu.",i:"Setiap hari saya naik kereta ke sekolah."},d:[{sp:"A",jp:"どうやって来ましたか？",h:"どうやってきましたか？",r:"Dō yatte kimashita ka?",i:"Bagaimana kamu ke sini?"},{sp:"B",jp:"バスに乗って来ました。",h:"バスにのってきました。",r:"Basu ni notte kimashita.",i:"Saya naik bus ke sini."}]},
{k:"入る",h:"はいる",r:"hairu",id:"Masuk",j:"v",lv:"N5",kw:1,s:{jp:"部屋に入る前にノックしてください。",h:"へやにはいるまえにノックしてください。",r:"Heya ni hairu mae ni nokku shite kudasai.",i:"Tolong ketuk pintu sebelum masuk kamar."},d:[{sp:"A",jp:"入ってもいいですか？",h:"はいってもいいですか？",r:"Haitte mo ii desu ka?",i:"Boleh masuk?"},{sp:"B",jp:"どうぞ、入ってください。",h:"どうぞ、はいってください。",r:"Dōzo, haitte kudasai.",i:"Silakan masuk."}]},
{k:"始まる",h:"はじまる",r:"hajimaru",id:"Mulai (sendiri)",j:"v",lv:"N5",kw:1,s:{jp:"授業は九時に始まります。",h:"じゅぎょうはくじにはじまります。",r:"Jugyō wa kuji ni hajimarimasu.",i:"Pelajaran mulai pukul sembilan."},d:[{sp:"A",jp:"映画は何時に始まりますか？",h:"えいがはなんじにはじまりますか？",r:"Eiga wa nanji ni hajimarimasu ka?",i:"Film mulai jam berapa?"},{sp:"B",jp:"七時に始まります。急ぎましょう。",h:"しちじにはじまります。いそぎましょう。",r:"Shichiji ni hajimarimasu. Isogimashō.",i:"Mulai jam 7. Ayo cepat."}]},
{k:"走る",h:"はしる",r:"hashiru",id:"Berlari",j:"v",lv:"N5",kw:1,s:{jp:"毎朝、公園で走ります。",h:"まいあさ、こうえんではしります。",r:"Maiasa, kōen de hashirimasu.",i:"Setiap pagi saya berlari di taman."},d:[{sp:"A",jp:"遅刻しそう！走りましょう！",h:"ちこくしそう！はしりましょう！",r:"Chikoku shisō! Hashirimashō!",i:"Sepertinya akan terlambat! Ayo lari!"},{sp:"B",jp:"わかった！一緒に走ろう！",h:"わかった！いっしょにはしろう！",r:"Wakatta! Issho ni hashirō!",i:"Oke! Ayo lari bersama!"}]},
{k:"働く",h:"はたらく",r:"hataraku",id:"Bekerja",j:"v",lv:"N5",kw:1,s:{jp:"父は毎日一生懸命働いています。",h:"ちちはまいにちいっしょうけんめいはたらいています。",r:"Chichi wa mainichi isshōkenmei hataraite imasu.",i:"Ayah bekerja keras setiap hari."},d:[{sp:"A",jp:"どんな仕事をしていますか？",h:"どんなしごとをしていますか？",r:"Donna shigoto o shite imasu ka?",i:"Kamu kerja di bidang apa?"},{sp:"B",jp:"学校で働いています。教師です。",h:"がっこうではたらいています。きょうしです。",r:"Gakkō de hataraite imasu. Kyōshi desu.",i:"Saya bekerja di sekolah. Saya guru."}]},
{k:"話す",h:"はなす",r:"hanasu",id:"Berbicara",j:"v",lv:"N5",kw:1,s:{jp:"日本語で話せるようになりました。",h:"にほんごではなせるようになりました。",r:"Nihongo de hanaseru yō ni narimashita.",i:"Saya sudah bisa berbicara dalam bahasa Jepang."},d:[{sp:"A",jp:"日本語で話せますか？",h:"にほんごではなせますか？",r:"Nihongo de hanasemasu ka?",i:"Bisa berbicara dalam bahasa Jepang?"},{sp:"B",jp:"少し話せます。まだ練習中です。",h:"すこしはなせます。まだれんしゅうちゅうです。",r:"Sukoshi hanasemasu. Mada renshū-chū desu.",i:"Bisa sedikit. Masih dalam latihan."}]},
{k:"待つ",h:"まつ",r:"matsu",id:"Menunggu",j:"v",lv:"N5",kw:1,s:{jp:"駅で友達を十分待ちました。",h:"えきでともだちをじゅっぷんまちました。",r:"Eki de tomodachi o juppun machimashita.",i:"Saya menunggu teman selama 10 menit di stasiun."},d:[{sp:"A",jp:"少し待ってもらえますか？",h:"すこしまってもらえますか？",r:"Sukoshi matte moraemasu ka?",i:"Bisa tolong tunggu sebentar?"},{sp:"B",jp:"はい、ここで待っています。",h:"はい、ここでまっています。",r:"Hai, koko de matte imasu.",i:"Baik, saya tunggu di sini."}]},
{k:"見る",h:"みる",r:"miru",id:"Melihat",j:"v",lv:"N5",kw:1,s:{jp:"テレビを見ながら食事をします。",h:"テレビをみながらしょくじをします。",r:"Terebi o minagara shokuji o shimasu.",i:"Saya makan sambil menonton TV."},d:[{sp:"A",jp:"昨日、映画を見ましたか？",h:"きのう、えいがをみましたか？",r:"Kinō, eiga o mimashita ka?",i:"Kemarin kamu nonton film?"},{sp:"B",jp:"はい、面白い映画を見ました。",h:"はい、おもしろいえいがをみました。",r:"Hai, omoshiroi eiga o mimashita.",i:"Iya, saya nonton film yang menarik."}]},
{k:"持つ",h:"もつ",r:"motsu",id:"Membawa/Memegang",j:"v",lv:"N5",kw:1,s:{jp:"重い荷物を持っています。",h:"おもいにもつをもっています。",r:"Omoi nimotsu o motte imasu.",i:"Saya membawa barang bawaan yang berat."},d:[{sp:"A",jp:"荷物を持ってあげましょうか？",h:"にもつをもってあげましょうか？",r:"Nimotsu o motte agemashō ka?",i:"Mau saya bantu bawakan barangnya?"},{sp:"B",jp:"ありがとうございます。お願いします。",h:"ありがとうございます。おねがいします。",r:"Arigatō gozaimasu. Onegai shimasu.",i:"Terima kasih. Mohon bantuannya."}]},
{k:"休む",h:"やすむ",r:"yasumu",id:"Beristirahat",j:"v",lv:"N5",kw:1,s:{jp:"疲れたので少し休みます。",h:"つかれたのですこしやすみます。",r:"Tsukareta node sukoshi yasumimasu.",i:"Karena lelah, saya beristirahat sebentar."},d:[{sp:"A",jp:"今日は学校を休んでもいいですか？",h:"きょうはがっこうをやすんでもいいですか？",r:"Kyō wa gakkō o yasunde mo ii desu ka?",i:"Boleh saya tidak masuk sekolah hari ini?"},{sp:"B",jp:"具合が悪いですか？",h:"ぐあいがわるいですか？",r:"Guai ga warui desu ka?",i:"Apakah kamu tidak enak badan?"}]},
{k:"読む",h:"よむ",r:"yomu",id:"Membaca",j:"v",lv:"N5",kw:1,s:{jp:"毎日新聞を読みます。",h:"まいにちしんぶんをよみます。",r:"Mainichi shinbun o yomimasu.",i:"Saya membaca koran setiap hari."},d:[{sp:"A",jp:"この本を読んだことがありますか？",h:"このほんをよんだことがありますか？",r:"Kono hon o yonda koto ga arimasu ka?",i:"Pernahkah kamu membaca buku ini?"},{sp:"B",jp:"はい、去年読みました。面白かったです。",h:"はい、きょねんよみました。おもしろかったです。",r:"Hai, kyonen yomimashita. Omoshirokatta desu.",i:"Pernah, saya baca tahun lalu. Menarik."}]},
{k:"分かる",h:"わかる",r:"wakaru",id:"Mengerti",j:"v",lv:"N5",kw:1,s:{jp:"先生の説明がよく分かりました。",h:"せんせいのせつめいがよくわかりました。",r:"Sensei no setsumei ga yoku wakarimashita.",i:"Penjelasan guru sangat bisa saya mengerti."},d:[{sp:"A",jp:"分かりましたか？",h:"わかりましたか？",r:"Wakarimashita ka?",i:"Apakah kamu mengerti?"},{sp:"B",jp:"はい、よく分かりました。",h:"はい、よくわかりました。",r:"Hai, yoku wakarimashita.",i:"Iya, mengerti dengan baik."}]},
{k:"忘れる",h:"わすれる",r:"wasureru",id:"Lupa",j:"v",lv:"N5",kw:1,s:{jp:"宿題を家に忘れてしまいました。",h:"しゅくだいをいえにわすれてしまいました。",r:"Shukudai o ie ni wasurete shimaimashita.",i:"Saya lupa meninggalkan PR di rumah."},d:[{sp:"A",jp:"名前を忘れてしまいました。すみません。",h:"なまえをわすれてしまいました。すみません。",r:"Namae o wasurete shimaimashita. Sumimasen.",i:"Saya lupa namanya. Maaf."},{sp:"B",jp:"大丈夫ですよ。もう一度言いますね。",h:"だいじょうぶですよ。もういちどいいますね。",r:"Daijōbu desu yo. Mō ichido iimasu ne.",i:"Tidak apa-apa. Saya ulangi sekali lagi ya."}]},

{k:"合う",h:"あう",r:"au",id:"Cocok/Pas",j:"v",lv:"N4",kw:0,s:{jp:"このサイズはよく合います。",h:"このサイズはよくあいます。",r:"Kono saizu wa yoku aimasu.",i:"Ukuran ini sangat cocok."},d:[{sp:"A",jp:"この色は私に合いますか？",h:"このいろはわたしにあいますか？",r:"Kono iro wa watashi ni aimasu ka?",i:"Apakah warna ini cocok untuk saya?"},{sp:"B",jp:"はい、とても似合っていますよ。",h:"はい、とてもにあっていますよ。",r:"Hai, totemo niatte imasu yo.",i:"Iya, sangat cocok untuk kamu."}]},
{k:"上がる",h:"あがる",r:"agaru",id:"Naik/Meningkat",j:"v",lv:"N4",kw:1,s:{jp:"気温が上がっています。",h:"きおんがあがっています。",r:"Kion ga agatte imasu.",i:"Suhu udara sedang naik."},d:[{sp:"A",jp:"最近、物価が上がりましたね。",h:"さいきん、ぶっかがあがりましたね。",r:"Saikin, bukka ga agarimashita ne.",i:"Belakangan ini harga-harga naik ya."},{sp:"B",jp:"そうですね。生活費が大変です。",h:"そうですね。せいかつひがたいへんです。",r:"Sō desu ne. Seikatsuhi ga taihen desu.",i:"Iya betul. Biaya hidup jadi berat."}]},
{k:"運ぶ",h:"はこぶ",r:"hakobu",id:"Mengangkut/Membawa",j:"v",lv:"N4",kw:1,s:{jp:"荷物を部屋まで運びました。",h:"にもつをへやまではこびました。",r:"Nimotsu o heya made hakobimashita.",i:"Saya mengangkut barang sampai ke kamar."},d:[{sp:"A",jp:"重い荷物を一人で運べますか？",h:"おもいにもつをひとりではこべますか？",r:"Omoi nimotsu o hitori de hakobemasu ka?",i:"Bisa mengangkut barang berat sendirian?"},{sp:"B",jp:"少し手伝ってもらえますか？",h:"すこしてつだってもらえますか？",r:"Sukoshi tetsudatte moraemasu ka?",i:"Bisa tolong bantu sedikit?"}]},
{k:"壊れる",h:"こわれる",r:"kowareru",id:"Rusak (sendiri)",j:"v",lv:"N4",kw:1,s:{jp:"パソコンが壊れてしまいました。",h:"パソコンがこわれてしまいました。",r:"Pasokon ga kowarete shimaimashita.",i:"Komputernya rusak."},d:[{sp:"A",jp:"エアコンが壊れました。どうしましょう。",h:"エアコンがこわれました。どうしましょう。",r:"Eakon ga kowaremashita. Dō shimashō.",i:"AC-nya rusak. Bagaimana ini."},{sp:"B",jp:"修理に出しましょうか？",h:"しゅうりにだしましょうか？",r:"Shūri ni dashimashō ka?",i:"Mau kita bawa ke tempat reparasi?"}]},
{k:"壊す",h:"こわす",r:"kowasu",id:"Merusak",j:"v",lv:"N4",kw:0,s:{jp:"うっかり皿を壊してしまいました。",h:"うっかりさらをこわしてしまいました。",r:"Ukkari sara o kowashite shimaimashita.",i:"Tanpa sengaja saya merusak/memecahkan piring."},d:[{sp:"A",jp:"どうして壊したんですか？",h:"どうしてこわしたんですか？",r:"Dōshite kowashita n desu ka?",i:"Kenapa kamu merusaknya?"},{sp:"B",jp:"事故です。本当に申し訳ありません。",h:"じこです。ほんとうにもうしわけありません。",r:"Jiko desu. Hontō ni mōshiwake arimasen.",i:"Kecelakaan. Saya benar-benar minta maaf."}]},
{k:"下がる",h:"さがる",r:"sagaru",id:"Turun/Menurun",j:"v",lv:"N4",kw:1,s:{jp:"熱が下がってよかったです。",h:"ねつがさがってよかったです。",r:"Netsu ga sagatte yokatta desu.",i:"Syukurlah demamnya turun."},d:[{sp:"A",jp:"最近、成績が下がってしまいました。",h:"さいきん、せいせきがさがってしまいました。",r:"Saikin, seiseki ga sagatte shimaimashita.",i:"Belakangan ini nilainya menurun."},{sp:"B",jp:"もっと勉強しなければなりませんね。",h:"もっとべんきょうしなければなりませんね。",r:"Motto benkyō shinakereba narimasen ne.",i:"Harus lebih giat belajar ya."}]},
{k:"楽しむ",h:"たのしむ",r:"tanoshimu",id:"Menikmati",j:"v",lv:"N4",kw:1,s:{jp:"音楽を楽しんでいます。",h:"おんがくをたのしんでいます。",r:"Ongaku o tanoshinde imasu.",i:"Saya sedang menikmati musik."},d:[{sp:"A",jp:"旅行を楽しんでいますか？",h:"りょこうをたのしんでいますか？",r:"Ryokō o tanoshinde imasu ka?",i:"Apakah kamu menikmati perjalanannya?"},{sp:"B",jp:"はい、とても楽しんでいます！",h:"はい、とてもたのしんでいます！",r:"Hai, totemo tanoshinde imasu!",i:"Iya, sangat menikmati!"}]},
{k:"触る",h:"さわる",r:"sawaru",id:"Menyentuh",j:"v",lv:"N4",kw:1,s:{jp:"展示品に触らないでください。",h:"てんじひんにさわらないでください。",r:"Tenji-hin ni sawaranaide kudasai.",i:"Tolong jangan menyentuh barang pameran."},d:[{sp:"A",jp:"この機械に触ってもいいですか？",h:"このきかいにさわってもいいですか？",r:"Kono kikai ni sawatte mo ii desu ka?",i:"Boleh saya menyentuh mesin ini?"},{sp:"B",jp:"すみません、触らないでください。",h:"すみません、さわらないでください。",r:"Sumimasen, sawaranaide kudasai.",i:"Maaf, tolong jangan disentuh."}]},
{k:"比べる",h:"くらべる",r:"kuraberu",id:"Membandingkan",j:"v",lv:"N4",kw:1,s:{jp:"二つの商品を比べてみました。",h:"ふたつのしょうひんをくらべてみました。",r:"Futatsu no shōhin o kurabete mimashita.",i:"Saya mencoba membandingkan dua produk."},d:[{sp:"A",jp:"AとBを比べると、どちらがいいですか？",h:"AとBをくらべると、どちらがいいですか？",r:"A to B o kuraberu to, dochira ga ii desu ka?",i:"Kalau membandingkan A dan B, mana yang lebih baik?"},{sp:"B",jp:"値段を比べると、Aのほうが安いです。",h:"ねだんをくらべると、Aのほうがやすいです。",r:"Nedan o kuraberu to, A no hō ga yasui desu.",i:"Kalau membandingkan harga, A lebih murah."}]},
{k:"決める",h:"きめる",r:"kimeru",id:"Memutuskan",j:"v",lv:"N4",kw:1,s:{jp:"旅行の日程を決めました。",h:"りょこうのにってをきめました。",r:"Ryokō no nittei o kimemashita.",i:"Saya sudah memutuskan jadwal perjalanan."},d:[{sp:"A",jp:"もう決めましたか？",h:"もうきめましたか？",r:"Mō kimemashita ka?",i:"Sudah memutuskan?"},{sp:"B",jp:"まだです。もう少し考えてから決めます。",h:"まだです。もうすこしかんがえてからきめます。",r:"Mada desu. Mō sukoshi kangaete kara kimemasu.",i:"Belum. Saya akan memutuskan setelah berpikir sedikit lagi."}]},
{k:"調べる",h:"しらべる",r:"shiraberu",id:"Menyelidiki/Mencari tahu",j:"v",lv:"N4",kw:1,s:{jp:"インターネットで調べました。",h:"インターネットでしらべました。",r:"Intānetto de shirabemashita.",i:"Saya mencari tahu di internet."},d:[{sp:"A",jp:"この言葉の意味を調べてもらえますか？",h:"このことばのいみをしらべてもらえますか？",r:"Kono kotoba no imi o shirabete moraemasu ka?",i:"Bisa tolong cari tahu arti kata ini?"},{sp:"B",jp:"はい、今すぐ調べます。",h:"はい、いますぐしらべます。",r:"Hai, ima sugu shirabemasu.",i:"Baik, sekarang saya cari."}]},
{k:"伝える",h:"つたえる",r:"tsutaeru",id:"Menyampaikan",j:"v",lv:"N4",kw:1,s:{jp:"大切なことを彼女に伝えました。",h:"たいせつなことをかのじょにつたえました。",r:"Taisetsuna koto o kanojo ni tsutaemashita.",i:"Saya menyampaikan hal penting kepadanya."},d:[{sp:"A",jp:"田中さんにこのメッセージを伝えてもらえますか？",h:"たなかさんにこのメッセージをつたえてもらえますか？",r:"Tanaka-san ni kono messēji o tsutaete moraemasu ka?",i:"Bisa tolong sampaikan pesan ini ke Tanaka-san?"},{sp:"B",jp:"はい、必ず伝えます。",h:"はい、かならずつたえます。",r:"Hai, kanarazu tsutaemasu.",i:"Baik, pasti akan saya sampaikan."}]},
{k:"手伝う",h:"てつだう",r:"tetsudau",id:"Membantu",j:"v",lv:"N4",kw:1,s:{jp:"引っ越しを手伝ってあげました。",h:"ひっこしをてつだってあげました。",r:"Hikkoshi o tetsudatte agemashita.",i:"Saya membantu pindahan rumah."},d:[{sp:"A",jp:"ちょっと手伝ってもらえますか？",h:"ちょっとてつだってもらえますか？",r:"Chotto tetsudatte moraemasu ka?",i:"Bisa tolong bantu sebentar?"},{sp:"B",jp:"もちろん！何を手伝えばいいですか？",h:"もちろん！なにをてつだえばいいですか？",r:"Mochiron! Nani o tetsudaeba ii desu ka?",i:"Tentu saja! Mau dibantu apa?"}]},
{k:"治る",h:"なおる",r:"naoru",id:"Sembuh",j:"v",lv:"N4",kw:1,s:{jp:"風邪が治りました。",h:"かぜがなおりました。",r:"Kaze ga naorimashita.",i:"Flu saya sudah sembuh."},d:[{sp:"A",jp:"具合はどうですか？もう治りましたか？",h:"ぐあいはどうですか？もうなおりましたか？",r:"Guai wa dō desu ka? Mō naorimashita ka?",i:"Bagaimana kondisinya? Sudah sembuh?"},{sp:"B",jp:"はい、おかげさまで治りました。",h:"はい、おかげさまでなおりました。",r:"Hai, okagesama de naorimashita.",i:"Sudah sembuh, terima kasih."}]},
{k:"払う",h:"はらう",r:"harau",id:"Membayar",j:"v",lv:"N4",kw:1,s:{jp:"レストランで食事代を払いました。",h:"レストランでしょくじだいをはらいました。",r:"Resutoran de shokuji-dai o haraimashita.",i:"Saya membayar biaya makan di restoran."},d:[{sp:"A",jp:"料金はどこで払えばいいですか？",h:"りょうきんはどこではらえばいいですか？",r:"Ryōkin wa doko de haraeba ii desu ka?",i:"Di mana saya harus membayar biayanya?"},{sp:"B",jp:"あちらのレジで払ってください。",h:"あちらのレジではらってください。",r:"Achira no reji de haratte kudasai.",i:"Tolong bayar di kasir sana."}]},
{k:"引っ越す",h:"ひっこす",r:"hikkosu",id:"Pindah rumah",j:"v",lv:"N4",kw:1,s:{jp:"来月、新しいアパートに引っ越します。",h:"らいげつ、あたらしいアパートにひっこします。",r:"Raigetsu, atarashii apāto ni hikkoshimasu.",i:"Bulan depan saya pindah ke apartemen baru."},d:[{sp:"A",jp:"もう引っ越しましたか？",h:"もうひっこしましたか？",r:"Mō hikkoshimashita ka?",i:"Sudah pindah?"},{sp:"B",jp:"はい、先週引っ越しました。",h:"はい、せんしゅうひっこしました。",r:"Hai, senshū hikkoshimashita.",i:"Sudah, pindah minggu lalu."}]},
{k:"増える",h:"ふえる",r:"fueru",id:"Bertambah",j:"v",lv:"N4",kw:0,s:{jp:"観光客が増えています。",h:"かんこうきゃくがふえています。",r:"Kankōkyaku ga fuete imasu.",i:"Jumlah wisatawan sedang bertambah."},d:[{sp:"A",jp:"最近、仕事が増えましたか？",h:"さいきん、しごとがふえましたか？",r:"Saikin, shigoto ga fuemashita ka?",i:"Belakangan ini pekerjaan bertambah?"},{sp:"B",jp:"はい、とても忙しいです。",h:"はい、とてもいそがしいです。",r:"Hai, totemo isogashii desu.",i:"Iya, sangat sibuk."}]},
{k:"間に合う",h:"まにあう",r:"maniau",id:"Tepat waktu",j:"v",lv:"N4",kw:1,s:{jp:"電車に間に合いました。",h:"でんしゃにまにあいました。",r:"Densha ni maniaimashita.",i:"Saya tepat waktu naik kereta."},d:[{sp:"A",jp:"急がないと間に合いませんよ！",h:"いそがないとまにあいませんよ！",r:"Isoganai to maniaimasen yo!",i:"Kalau tidak cepat tidak akan tepat waktu!"},{sp:"B",jp:"わかった！今すぐ行きます！",h:"わかった！いますぐいきます！",r:"Wakatta! Ima sugu ikimasu!",i:"Oke! Saya pergi sekarang!"}]},
{k:"見つける",h:"みつける",r:"mitsukeru",id:"Menemukan",j:"v",lv:"N4",kw:1,s:{jp:"なくした財布を見つけました。",h:"なくしたさいふをみつけました。",r:"Nakushita saifu o mitsukemashita.",i:"Saya menemukan dompet yang hilang."},d:[{sp:"A",jp:"鍵を見つけられましたか？",h:"かぎをみつけられましたか？",r:"Kagi o mitsukeraremashita ka?",i:"Apakah kamu sudah menemukan kuncinya?"},{sp:"B",jp:"はい！ソファの下で見つけました。",h:"はい！ソファのしたでみつけました。",r:"Hai! Sofa no shita de mitsukemashita.",i:"Sudah! Saya menemukannya di bawah sofa."}]},
{k:"戻る",h:"もどる",r:"modoru",id:"Kembali",j:"v",lv:"N4",kw:1,s:{jp:"忘れ物をしたので、家に戻りました。",h:"わすれものをしたので、いえにもどりました。",r:"Wasuremono o shita node, ie ni modorimashita.",i:"Karena ada yang terlupa, saya kembali ke rumah."},d:[{sp:"A",jp:"いつ戻りますか？",h:"いつもどりますか？",r:"Itsu modorimasu ka?",i:"Kapan kamu kembali?"},{sp:"B",jp:"三時ごろ戻る予定です。",h:"さんじごろもどるよていです。",r:"Sanji goro modoru yotei desu.",i:"Rencana kembali sekitar jam 3."}]},
{k:"遅れる",h:"おくれる",r:"okureru",id:"Terlambat",j:"v",lv:"N4",kw:1,s:{jp:"渋滞で会議に遅れてしまいました。",h:"じゅうたいでかいぎにおくれてしまいました。",r:"Jūtai de kaigi ni okurete shimaimashita.",i:"Saya terlambat ke rapat karena macet."},d:[{sp:"A",jp:"すみません、少し遅れます。",h:"すみません、すこしおくれます。",r:"Sumimasen, sukoshi okuremasu.",i:"Maaf, saya akan sedikit terlambat."},{sp:"B",jp:"大丈夫ですよ。気をつけて来てください。",h:"だいじょうぶですよ。きをつけてきてください。",r:"Daijōbu desu yo. Ki o tsukete kite kudasai.",i:"Tidak apa-apa. Hati-hati di jalan ya."}]},
{k:"参加する",h:"さんかする",r:"sanka suru",id:"Ikut serta/Berpartisipasi",j:"v",lv:"N4",kw:1,s:{jp:"来週のイベントに参加します。",h:"らいしゅうのイベントにさんかします。",r:"Raishū no ibento ni sanka shimasu.",i:"Saya akan berpartisipasi dalam acara minggu depan."},d:[{sp:"A",jp:"このプロジェクトに参加しませんか？",h:"このプロジェクトにさんかしませんか？",r:"Kono purojekuto ni sanka shimasen ka?",i:"Mau ikut serta dalam proyek ini?"},{sp:"B",jp:"ぜひ参加したいです！",h:"ぜひさんかしたいです！",r:"Zehi sanka shitai desu!",i:"Saya sangat ingin ikut serta!"}]},
{k:"申し込む",h:"もうしこむ",r:"moushikomu",id:"Mendaftar",j:"v",lv:"N4",kw:1,s:{jp:"日本語のコースに申し込みました。",h:"にほんごのコースにもうしこみました。",r:"Nihongo no kōsu ni mōshikomimashita.",i:"Saya mendaftar kursus bahasa Jepang."},d:[{sp:"A",jp:"どうやって申し込めばいいですか？",h:"どうやってもうしこめばいいですか？",r:"Dō yatte mōshikomeba ii desu ka?",i:"Bagaimana cara mendaftarnya?"},{sp:"B",jp:"ウェブサイトから申し込んでください。",h:"ウェブサイトからもうしこんでください。",r:"Webusaito kara mōshikonde kudasai.",i:"Tolong daftar melalui website."}]},
{k:"合格する",h:"ごうかくする",r:"goukaku suru",id:"Lulus (ujian)",j:"v",lv:"N4",kw:1,s:{jp:"N4の試験に合格しました！",h:"N4のしけんにごうかくしました！",r:"N4 no shiken ni gōkaku shimashita!",i:"Saya lulus ujian N4!"},d:[{sp:"A",jp:"試験の結果はどうでしたか？",h:"しけんのけっかはどうでしたか？",r:"Shiken no kekka wa dō deshita ka?",i:"Bagaimana hasil ujiannya?"},{sp:"B",jp:"合格しました！とても嬉しいです！",h:"ごうかくしました！とてもうれしいです！",r:"Gōkaku shimashita! Totemo ureshii desu!",i:"Lulus! Sangat senang!"}]},
{k:"相談する",h:"そうだんする",r:"soudan suru",id:"Berunding/Konsultasi",j:"v",lv:"N4",kw:1,s:{jp:"先生に相談してみました。",h:"せんせいにそうだんしてみました。",r:"Sensei ni sōdan shite mimashita.",i:"Saya mencoba berkonsultasi dengan guru."},d:[{sp:"A",jp:"困ったことがあれば、相談してください。",h:"こまったことがあれば、そうだんしてください。",r:"Komatta koto ga areba, sōdan shite kudasai.",i:"Kalau ada masalah, tolong konsultasikan."},{sp:"B",jp:"ありがとうございます。少し相談があります。",h:"ありがとうございます。すこしそうだんがあります。",r:"Arigatō gozaimasu. Sukoshi sōdan ga arimasu.",i:"Terima kasih. Ada sedikit yang ingin saya konsultasikan."}]},

{k:"大きい",h:"おおきい",r:"ookii",id:"Besar",j:"adj",lv:"N5",kw:1,s:{jp:"あの建物はとても大きいです。",h:"あのたてものはとてもおおきいです。",r:"Ano tatemono wa totemo ōkii desu.",i:"Gedung itu sangat besar."},d:[{sp:"A",jp:"どちらのほうが大きいですか？",h:"どちらのほうがおおきいですか？",r:"Dochira no hō ga ōkii desu ka?",i:"Yang mana yang lebih besar?"},{sp:"B",jp:"右のほうが大きいと思います。",h:"みぎのほうがおおきいとおもいます。",r:"Migi no hō ga ōkii to omoimasu.",i:"Saya rasa yang kanan lebih besar."}]},
{k:"小さい",h:"ちいさい",r:"chiisai",id:"Kecil",j:"adj",lv:"N5",kw:1,s:{jp:"この部屋は少し小さいです。",h:"このへやはすこしちいさいです。",r:"Kono heya wa sukoshi chiisai desu.",i:"Kamar ini agak kecil."},d:[{sp:"A",jp:"このサイズは小さすぎますか？",h:"このサイズはちいさすぎますか？",r:"Kono saizu wa chiisa-sugimasu ka?",i:"Apakah ukuran ini terlalu kecil?"},{sp:"B",jp:"少し小さいですが、大丈夫です。",h:"すこしちいさいですが、だいじょうぶです。",r:"Sukoshi chiisai desu ga, daijōbu desu.",i:"Agak kecil, tapi tidak apa-apa."}]},
{k:"おいしい",h:"おいしい",r:"oishii",id:"Enak/Lezat",j:"adj",lv:"N5",kw:1,s:{jp:"この料理はとてもおいしいです！",h:"このりょうりはとてもおいしいです！",r:"Kono ryōri wa totemo oishii desu!",i:"Masakan ini sangat enak!"},d:[{sp:"A",jp:"この料理はどうですか？",h:"このりょうりはどうですか？",r:"Kono ryōri wa dō desu ka?",i:"Bagaimana masakan ini?"},{sp:"B",jp:"とてもおいしいです！何が入っていますか？",h:"とてもおいしいです！なにがはいっていますか？",r:"Totemo oishii desu! Nani ga haitte imasu ka?",i:"Sangat enak! Bahan apa saja yang dipakai?"}]},
{k:"難しい",h:"むずかしい",r:"muzukashii",id:"Sulit",j:"adj",lv:"N5",kw:1,s:{jp:"漢字はとても難しいですが、面白いです。",h:"かんじはとてもむずかしいですが、おもしろいです。",r:"Kanji wa totemo muzukashii desu ga, omoshiroi desu.",i:"Kanji sangat sulit, tetapi menarik."},d:[{sp:"A",jp:"日本語は難しいですか？",h:"にほんごはむずかしいですか？",r:"Nihongo wa muzukashii desu ka?",i:"Apakah bahasa Jepang sulit?"},{sp:"B",jp:"少し難しいですが、毎日練習しています。",h:"すこしむずかしいですが、まいにちれんしゅうしています。",r:"Sukoshi muzukashii desu ga, mainichi renshū shite imasu.",i:"Agak sulit, tapi saya berlatih setiap hari."}]},
{k:"暑い",h:"あつい",r:"atsui",id:"Panas (udara)",j:"adj",lv:"N5",kw:1,s:{jp:"今日はとても暑いですね。",h:"きょうはとてもあついですね。",r:"Kyō wa totemo atsui desu ne.",i:"Hari ini sangat panas ya."},d:[{sp:"A",jp:"暑いですね。エアコンをつけましょうか？",h:"あついですね。エアコンをつけましょうか？",r:"Atsui desu ne. Eakon o tsukemashō ka?",i:"Panas ya. Mau saya nyalakan AC?"},{sp:"B",jp:"はい、お願いします。",h:"はい、おねがいします。",r:"Hai, onegai shimasu.",i:"Iya, tolong."}]},
{k:"寒い",h:"さむい",r:"samui",id:"Dingin (udara)",j:"adj",lv:"N5",kw:1,s:{jp:"冬は寒いので、コートを着ます。",h:"ふゆはさむいので、コートをきます。",r:"Fuyu wa samui node, kōto o kimasu.",i:"Karena musim dingin dingin, saya memakai mantel."},d:[{sp:"A",jp:"今日は寒いですね。",h:"きょうはさむいですね。",r:"Kyō wa samui desu ne.",i:"Hari ini dingin ya."},{sp:"B",jp:"そうですね。コートを着てきてよかったです。",h:"そうですね。コートをきてきてよかったです。",r:"Sō desu ne. Kōto o kite kite yokatta desu.",i:"Iya betul. Syukurlah saya memakai mantel."}]},
{k:"好き",h:"すき",r:"suki",id:"Suka",j:"adj",lv:"N5",kw:1,s:{jp:"私は音楽が好きです。",h:"わたしはおんがくがすきです。",r:"Watashi wa ongaku ga suki desu.",i:"Saya suka musik."},d:[{sp:"A",jp:"どんな音楽が好きですか？",h:"どんなおんがくがすきですか？",r:"Donna ongaku ga suki desu ka?",i:"Kamu suka musik apa?"},{sp:"B",jp:"JPOPが好きです。",h:"JPOPがすきです。",r:"JPOP ga suki desu.",i:"Saya suka JPOP."}]},
{k:"嫌い",h:"きらい",r:"kirai",id:"Tidak suka",j:"adj",lv:"N5",kw:1,s:{jp:"私はゴキブリが嫌いです。",h:"わたしはゴキブリがきらいです。",r:"Watashi wa gokiburi ga kirai desu.",i:"Saya tidak suka kecoa."},d:[{sp:"A",jp:"苦手な食べ物がありますか？",h:"にがてなたべものがありますか？",r:"Nigate na tabemono ga arimasu ka?",i:"Apakah ada makanan yang tidak kamu suka?"},{sp:"B",jp:"納豆が少し嫌いです。",h:"なっとうがすこしきらいです。",r:"Nattō ga sukoshi kirai desu.",i:"Saya agak tidak suka natto."}]},
{k:"上手",h:"じょうず",r:"jouzu",id:"Mahir/Pandai",j:"adj",lv:"N5",kw:1,s:{jp:"田中さんは料理が上手です。",h:"たなかさんはりょうりがじょうずです。",r:"Tanaka-san wa ryōri ga jōzu desu.",i:"Tanaka-san mahir memasak."},d:[{sp:"A",jp:"日本語が上手ですね！",h:"にほんごがじょうずですね！",r:"Nihongo ga jōzu desu ne!",i:"Bahasa Jepangmu mahir ya!"},{sp:"B",jp:"いいえ、まだまだです。もっと練習が必要です。",h:"いいえ、まだまだです。もっとれんしゅうがひつようです。",r:"Iie, madamada desu. Motto renshū ga hitsuyō desu.",i:"Tidak, masih jauh. Saya masih perlu banyak latihan."}]},
{k:"きれい",h:"きれい",r:"kirei",id:"Cantik/Bersih",j:"adj",lv:"N5",kw:1,s:{jp:"この花はとてもきれいです。",h:"このはなはとてもきれいです。",r:"Kono hana wa totemo kirei desu.",i:"Bunga ini sangat cantik."},d:[{sp:"A",jp:"この部屋はきれいですね。",h:"このへやはきれいですね。",r:"Kono heya wa kirei desu ne.",i:"Kamar ini bersih ya."},{sp:"B",jp:"ありがとうございます。毎日掃除しています。",h:"ありがとうございます。まいにちそうじしています。",r:"Arigatō gozaimasu. Mainichi sōji shite imasu.",i:"Terima kasih. Saya bersih-bersih setiap hari."}]},
{k:"便利",h:"べんり",r:"benri",id:"Praktis/Nyaman",j:"adj",lv:"N5",kw:1,s:{jp:"スマートフォンはとても便利です。",h:"スマートフォンはとてもべんりです。",r:"Sumātofon wa totemo benri desu.",i:"Smartphone sangat praktis."},d:[{sp:"A",jp:"この近くに住んでいると便利ですか？",h:"このちかくにすんでいるとべんりですか？",r:"Kono chikaku ni sunde iru to benri desu ka?",i:"Apakah tinggal di dekat sini praktis?"},{sp:"B",jp:"はい、駅も近いのでとても便利です。",h:"はい、えきもちかいのでとてもべんりです。",r:"Hai, eki mo chikai no de totemo benri desu.",i:"Iya, stasiun juga dekat jadi sangat praktis."}]},

{k:"珍しい",h:"めずらしい",r:"mezurashii",id:"Jarang/Langka",j:"adj",lv:"N4",kw:1,s:{jp:"この植物は珍しいですね。",h:"このしょくぶつはめずらしいですね。",r:"Kono shokubutsu wa mezurashii desu ne.",i:"Tanaman ini langka ya."},d:[{sp:"A",jp:"この食べ物は日本では珍しいですか？",h:"このたべものはにほんではめずらしいですか？",r:"Kono tabemono wa Nihon de wa mezurashii desu ka?",i:"Apakah makanan ini langka di Jepang?"},{sp:"B",jp:"はい、あまり見かけません。",h:"はい、あまりみかけません。",r:"Hai, amari mikakemasen.",i:"Iya, jarang sekali ditemukan."}]},
{k:"優しい",h:"やさしい",r:"yasashii",id:"Lemah lembut/Baik hati",j:"adj",lv:"N4",kw:1,s:{jp:"田中先生はとても優しいです。",h:"たなかせんせいはとてもやさしいです。",r:"Tanaka-sensei wa totemo yasashii desu.",i:"Guru Tanaka sangat baik hati."},d:[{sp:"A",jp:"あの人は優しいですか？",h:"あのひとはやさしいですか？",r:"Ano hito wa yasashii desu ka?",i:"Apakah orang itu baik hati?"},{sp:"B",jp:"はい、とても優しくていつも助けてくれます。",h:"はい、とてもやさしくていつもたすけてくれます。",r:"Hai, totemo yasashikute itsumo tasukete kuremasu.",i:"Iya, sangat baik hati dan selalu membantu."}]},
{k:"怖い",h:"こわい",r:"kowai",id:"Takut/Menakutkan",j:"adj",lv:"N4",kw:1,s:{jp:"その映画はとても怖かったです。",h:"そのえいがはとてもこわかったです。",r:"Sono eiga wa totemo kowakatta desu.",i:"Film itu sangat menakutkan."},d:[{sp:"A",jp:"お化け屋敷は怖いですか？",h:"おばけやしきはこわいですか？",r:"Obake-yashiki wa kowai desu ka?",i:"Apakah rumah hantu itu menakutkan?"},{sp:"B",jp:"はい、とても怖くて途中で出てしまいました。",h:"はい、とてもこわくてとちゅうででてしまいました。",r:"Hai, totemo kowakute tochū de dete shimaimashita.",i:"Iya, sangat menakutkan sampai saya keluar di tengah jalan."}]},
{k:"嬉しい",h:"うれしい",r:"ureshii",id:"Senang/Gembira",j:"adj",lv:"N4",kw:1,s:{jp:"プレゼントをもらってとても嬉しいです。",h:"プレゼントをもらってとてもうれしいです。",r:"Purezento o moratte totemo ureshii desu.",i:"Saya sangat senang mendapat hadiah."},d:[{sp:"A",jp:"合格おめでとうございます！",h:"ごうかくおめでとうございます！",r:"Gōkaku omedetō gozaimasu!",i:"Selamat lulus ujian!"},{sp:"B",jp:"ありがとうございます！とても嬉しいです！",h:"ありがとうございます！とてもうれしいです！",r:"Arigatō gozaimasu! Totemo ureshii desu!",i:"Terima kasih! Saya sangat senang!"}]},

// ========== PWA ==========
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('inst-banner').style.display='flex';
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('inst-banner').style.display='none';});}
}

// ========== TTS ==========
function speak(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

// ========== FILTER ==========
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  return V.filter(d=>{
    if(filt.level!=='semua'&&d.lv!==filt.level)return false;
    if(filt.jenis!=='semua'&&d.j!==filt.jenis)return false;
    if(filt.kaiwa&&!d.kw)return false;
    if(curTab==='hafal'&&!hafalSet.has(d.k))return false;
    if(!q)return true;
    return d.k.includes(q)||d.h.includes(q)||d.r.toLowerCase().includes(q)||d.id.toLowerCase().includes(q);
  });
}

function setF(type,val){
  if(type==='kaiwa'){filt.kaiwa=!filt.kaiwa;}
  else{filt[type]=val;}
  updChips();renderList();
}

function updChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    const oc=c.getAttribute('onclick')||'';
    if(oc.includes("'level'")){const v=oc.match(/'([^']+)'\)/)?.[1];c.classList.toggle('active',v===filt.level);}
    else if(oc.includes("'jenis'")){const v=oc.match(/'([^']+)'\)/)?.[1];c.classList.toggle('active',v===filt.jenis);}
    else if(oc.includes("'kaiwa'")){c.classList.toggle('active',filt.kaiwa);}
  });
}

function onSearch(){
  const v=document.getElementById('search').value;
  document.getElementById('sc').style.display=v?'flex':'none';
  renderList();
}
function clearSearch(){document.getElementById('search').value='';document.getElementById('sc').style.display='none';renderList();}

// ========== TABS ==========
function setTab(tab){
  curTab=tab;
  const names=['browse','flash','quiz','particle','build','hafal'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===tab));
  names.forEach(n=>document.getElementById(n+'-tab').style.display=n===tab?'':'none');
  document.getElementById('filters').style.display=(tab==='quiz'||tab==='particle'||tab==='build')?'none':'';
  if(tab==='browse')renderList();
  if(tab==='flash')renderFlash();
  if(tab==='quiz')startQuiz();
  if(tab==='particle')startParticle();
  if(tab==='build')startBuild();
  if(tab==='hafal')renderHafal();
}

// ========== BADGE HELPERS ==========
function bjenis(j){
  const m={v:'Kata Kerja',n:'Kata Benda',adj:'Kata Sifat',adv:'Keterangan',expr:'Ekspresi'};
  const c={v:'bv',n:'bn',adj:'badj',adv:'badv',expr:'bex'};
  return`<span class="bdg ${c[j]}">${m[j]||j}</span>`;
}
function blv(l){return`<span class="bdg b${l.toLowerCase()}">${l}</span>`;}

// ========== RENDER LIST ==========
function renderList(){
  const list=getFiltered();
  document.getElementById('stats-pill').textContent=list.length+' kata';
  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Tidak ada hasil.</div>';return;}
  el.innerHTML=list.map(d=>{
    const idx=V.indexOf(d);const isOpen=openCards.has(idx);const isH=hafalSet.has(d.k);
    return`<div class="card${isOpen?' open':''}${isH?' hd':''}" id="vc${idx}">
      <div class="card-head" onclick="togCard(${idx})">
        <div class="ck">${d.k}</div>
        <div class="cm"><div class="cmn">${d.id}</div><div class="cms">${d.h} · ${d.r}</div></div>
        <div class="cbdg">${blv(d.lv)}${bjenis(d.j)}${d.kw?'<span class="bdg bkw">🗣</span>':''}</div>
        <button class="spk-btn" onclick="event.stopPropagation();speak('${d.k.replace(/'/g,"\\'")}')">🔊</button>
        <button class="hbtn${isH?' on':''}" onclick="togH(event,'${d.k.replace(/'/g,"\\'")}')">
          ${isH?'✓':'○'}
        </button>
        <span class="xi">▾</span>
      </div>
      <div class="card-body">
        <div class="sec">
          <div class="slbl">Kalimat contoh</div>
          <div style="display:flex;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <div class="sjp">${d.s.jp}</div>
              <div class="sh">${d.s.h}</div><div class="sr">${d.s.r}</div>
              <div class="si2">${d.s.i}</div>
            </div>
            <button class="spk-btn" style="flex-shrink:0;margin-top:2px" onclick="speak('${d.s.jp.replace(/'/g,"\\'")}')">🔊</button>
          </div>
        </div>
        <div class="sec">
          <div class="slbl">Kaiwa (会話)</div>
          <div class="kwbox">${d.d.map(k=>`<div class="kwl">
            <div class="kwsp">${k.sp}</div>
            <div style="display:flex;align-items:flex-start;gap:6px">
              <div style="flex:1"><div class="kwjp">${k.jp}</div><div class="kwh">${k.h}</div><div class="kwr">${k.r}</div><div class="kwid">${k.i}</div></div>
              <button class="spk-btn" onclick="speak('${k.jp.replace(/'/g,"\\'")}')">🔊</button>
            </div>
          </div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  updHC();
}

function togCard(idx){
  if(openCards.has(idx))openCards.delete(idx);else openCards.add(idx);
  const c=document.getElementById('vc'+idx);if(c)c.classList.toggle('open');
}
function togH(e,key){
  e.stopPropagation();
  if(hafalSet.has(key))hafalSet.delete(key);else hafalSet.add(key);
  localStorage.setItem('hfl',JSON.stringify([...hafalSet]));
  updHC();renderList();
}
function updHC(){document.getElementById('hc').textContent=hafalSet.size;}

// ========== RENDER HAFAL ==========
function renderHafal(){
  const list=V.filter(d=>hafalSet.has(d.k));
  const el=document.getElementById('hafal-list');
  document.getElementById('stats-pill').textContent=list.length+' hafal';
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>Belum ada kata yang ditandai hafal.<br>Tekan ○ pada kartu untuk menandai hafal.</div>';return;}
  el.innerHTML=list.map(d=>`<div class="card hd">
    <div class="card-head">
      <div class="ck">${d.k}</div>
      <div class="cm"><div class="cmn">${d.id}</div><div class="cms">${d.h} · ${d.r}</div></div>
      <div class="cbdg">${blv(d.lv)}${bjenis(d.j)}</div>
      <button class="spk-btn" onclick="speak('${d.k.replace(/'/g,"\\'")}')">🔊</button>
      <button class="hbtn on" onclick="togH(event,'${d.k.replace(/'/g,"\\'")}');renderHafal()">✓</button>
    </div>
  </div>`).join('');
}

// ========== FLASHCARD ==========
function renderFlash(){
  const pool=getFiltered().length>3?getFiltered():V;
  fcState.deck=[...pool].sort(()=>Math.random()-.5).slice(0,20);
  fcState.cur=0;fcState.correct=0;fcState.answered=false;
  const el=document.getElementById('flash-tab');
  const typeOpts=['jp-id','id-jp','romaji'];
  const typeLbl=['JP → ID','ID → JP','Romaji?'];
  el.innerHTML=`<div class="fc-wrap">
    <div class="fc-ctrl">
      <select onchange="setFCType(this.value)">${typeOpts.map((t,i)=>`<option value="${t}">${typeLbl[i]}</option>`).join('')}</select>
      <button onclick="renderFlash()">🔀 Acak</button>
    </div>
    <div class="fc-prog">
      <div class="fc-prog-top"><span id="fc-prog-txt">0 / ${fcState.deck.length}</span><span id="fc-score-txt">✅ 0</span></div>
      <div class="pbg"><div class="pf" id="fc-bar" style="width:0%"></div></div>
    </div>
    <div id="fc-main"></div>
  </div>`;
  renderFCCard();
}

function setFCType(t){fcState.type=t;fcState.cur=0;fcState.correct=0;fcState.answered=false;renderFCCard();}

function renderFCCard(){
  const {deck,cur,correct,type}=fcState;
  const el=document.getElementById('fc-main');
  if(!el)return;
  document.getElementById('fc-prog-txt').textContent=`${cur} / ${deck.length}`;
  document.getElementById('fc-score-txt').textContent=`✅ ${correct}`;
  document.getElementById('fc-bar').style.width=Math.round(cur/deck.length*100)+'%';
  if(cur>=deck.length){
    el.innerHTML=`<div class="fc-done"><div class="fc-score">${correct}/${deck.length}</div><div class="fc-score-lbl">${correct>=deck.length*.8?'🎉 Hebat!':correct>=deck.length*.5?'👍 Bagus!':'💪 Terus berlatih!'} (${Math.round(correct/deck.length*100)}%)</div><button class="restart-btn" onclick="renderFlash()">Mulai Lagi</button></div>`;
    return;
  }
  const d=deck[cur];
  let front,back1,back2,back3;
  if(type==='jp-id'){front=d.k;back1=d.id;back2=d.h;back3=d.r;}
  else if(type==='id-jp'){front=d.id;back1=d.k;back2=d.h;back3=d.r;}
  else{front=d.k;back1=d.r;back2=d.h;back3=d.id;}
  el.innerHTML=`
    <div class="fc-scene" id="fc-scene" onclick="flipFC()">
      <div class="fc-inner">
        <div class="fc-front">
          <div class="fc-word">${front}</div>
          <div class="fc-hint">${type==='jp-id'?d.lv+' · '+{v:'Kata Kerja',n:'Kata Benda',adj:'Kata Sifat',adv:'Keterangan',expr:'Ekspresi'}[d.j]:''}</div>
          <div class="fc-tap">Tap untuk lihat jawaban 👆</div>
        </div>
        <div class="fc-back">
          <div class="fc-ans">${back1}</div>
          <div class="fc-ans2">${back2}</div>
          <div class="fc-ans3">${back3}</div>
          <button style="margin-top:10px;background:none;border:none;font-size:20px;cursor:pointer" onclick="event.stopPropagation();speak('${d.k.replace(/'/g,"\\'")}')">🔊</button>
        </div>
      </div>
    </div>
    <div class="fc-btns" id="fc-btns" style="display:none">
      <button class="fc-btn wrong" onclick="fcAnswer(false)">✗ Belum hafal</button>
      <button class="fc-btn correct" onclick="fcAnswer(true)">✓ Hafal!</button>
    </div>`;
}

function flipFC(){
  const s=document.getElementById('fc-scene');
  if(s){s.classList.toggle('flipped');document.getElementById('fc-btns').style.display='flex';}
}
function fcAnswer(ok){
  if(ok)fcState.correct++;fcState.cur++;fcState.answered=false;renderFCCard();
}

// ========== QUIZ ==========
function startQuiz(){
  const pool=getFiltered().length>4?getFiltered():V;
  qzState.q=[...pool].sort(()=>Math.random()-.5).slice(0,20);
  qzState.cur=0;qzState.correct=0;qzState.answered=false;
  renderQuizQ();
}
function setQZType(t){
  qzState.type=t;
  document.querySelectorAll('.qz-type-btn').forEach((b,i)=>b.classList.toggle('active',['jp-id','id-jp','romaji'][i]===t));
  startQuiz();
}
function renderQuizQ(){
  const {q,cur,correct,type}=qzState;
  const el=document.getElementById('quiz-tab');
  const bar=Math.round(cur/q.length*100);
  let head=`<div class="qz-wrap"><div class="qz-ctrl">
    <div class="qz-type-row">
      ${['jp-id','id-jp','romaji'].map((t,i)=>`<button class="qz-type-btn${t===type?' active':''}" onclick="setQZType('${t}')">${['JP→ID','ID→JP','Romaji?'][i]}</button>`).join('')}
    </div>
    <div class="qz-prog-top"><span>Soal ${cur+1}/${q.length}</span><span>✅ ${correct}</span></div>
    <div class="pbg"><div class="pf" style="width:${bar}%"></div></div>
  </div>`;
  if(cur>=q.length){
    el.innerHTML=head+`<div class="qz-result"><div class="qz-score">${correct}/${q.length}</div><div class="qz-score-lbl">${correct>=q.length*.8?'🎉 Hebat!':correct>=q.length*.5?'👍 Bagus!':'💪 Terus berlatih!'}</div><p style="font-size:13px;color:var(--t2);margin-bottom:16px">Skor: ${Math.round(correct/q.length*100)}%</p><button class="restart-btn" onclick="startQuiz()">Mulai Lagi</button></div></div>`;
    return;
  }
  const d=q[cur];
  const wrong=V.filter(w=>w.k!==d.k).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[...wrong,d].sort(()=>Math.random()-.5);
  let question,getAns;
  if(type==='jp-id'){question=d.k;getAns=c=>c.id;}
  else if(type==='id-jp'){question=d.id;getAns=c=>c.k;}
  else{question=d.k;getAns=c=>c.r;}
  el.innerHTML=head+`<div class="qz-card">
    <div class="qz-word">${question}</div>
    <div style="display:flex;justify-content:center;margin-bottom:4px"><button style="background:none;border:none;font-size:22px;cursor:pointer" onclick="speak('${d.k.replace(/'/g,"\\'")}')">🔊</button></div>
    <div class="qz-hint">${type==='jp-id'?'Apa artinya?':type==='id-jp'?'Kanji mana yang benar?':'Apa romanjinya?'}</div>
    <div class="qz-choices">${choices.map(c=>`<button class="qz-ch" onclick="ansQuiz(this,'${c.k.replace(/'/g,"\\'")}','${d.k.replace(/'/g,"\\'")}',${JSON.stringify(getAns(c)).replace(/'/g,"\\'")})">${getAns(c)}</button>`).join('')}</div>
    <button class="qz-next" id="qz-next" onclick="nextQ()">Lanjut →</button>
  </div></div>`;
}
function ansQuiz(btn,chosen,correct,chosenLabel){
  if(qzState.answered)return;qzState.answered=true;
  const isOk=chosen===correct;
  if(isOk)qzState.correct++;
  document.querySelectorAll('.qz-ch').forEach(b=>{
    b.disabled=true;
    const d=qzState.q[qzState.cur];
    const type=qzState.type;
    let correctLabel=type==='jp-id'?d.id:type==='id-jp'?d.k:d.r;
    if(b===btn)b.classList.add(isOk?'ok':'ng');
    if(b.textContent.trim()===correctLabel&&!isOk)b.classList.add('ok');
  });
  document.getElementById('qz-next').style.display='block';
}
function nextQ(){qzState.cur++;qzState.answered=false;renderQuizQ();}

// ========== PARTICLE ==========
function startParticle(){
  ptState.q=[...PARTICLE_Q].sort(()=>Math.random()-.5);
  ptState.cur=0;ptState.correct=0;ptState.answered=false;
  renderParticle();
}
function renderParticle(){
  const {q,cur,correct}=ptState;
  const el=document.getElementById('particle-tab');
  const bar=Math.round(cur/q.length*100);
  let head=`<div class="qz-wrap"><div class="qz-ctrl">
    <div class="qz-prog-top"><span>Soal ${cur+1}/${q.length}</span><span>✅ ${correct}</span></div>
    <div class="pbg"><div class="pf" style="width:${bar}%"></div></div>
  </div>`;
  if(cur>=q.length){
    el.innerHTML=head+`<div class="qz-result"><div class="qz-score">${correct}/${q.length}</div><div class="qz-score-lbl">${correct>=q.length*.8?'🎉 Kamu menguasai partikel!':correct>=q.length*.5?'👍 Terus berlatih!':'💪 Pelajari partikel lebih lanjut!'}</div><p style="font-size:13px;color:var(--t2);margin-bottom:16px">Skor: ${Math.round(correct/q.length*100)}%</p><button class="restart-btn" onclick="startParticle()">Mulai Lagi</button></div></div>`;
    return;
  }
  const qq=q[cur];
  const sent=qq.s.replace('__',`<span class="fill-blank">＿＿</span>`);
  el.innerHTML=head+`<div class="fill-card">
    <div class="slbl">Pilih partikel yang benar</div>
    <div class="fill-sent" style="margin:10px 0 14px">${sent}</div>
    <div class="fill-opts">${qq.opts.map(o=>`<button class="fill-opt" onclick="ansPT(this,'${o}','${qq.ans}')">${o}</button>`).join('')}</div>
    <div class="fill-exp" id="pt-exp">${qq.exp}</div>
    <button class="qz-next" id="pt-next" onclick="nextPT()">Lanjut →</button>
  </div></div>`;
}
function ansPT(btn,chosen,ans){
  if(ptState.answered)return;ptState.answered=true;
  const isOk=chosen===ans;
  if(isOk)ptState.correct++;
  document.querySelectorAll('.fill-opt').forEach(b=>{
    b.disabled=true;
    if(b===btn)b.classList.add(isOk?'ok':'ng');
    if(b.textContent.trim()===ans&&!isOk)b.classList.add('ok');
  });
  document.getElementById('pt-exp').style.display='block';
  document.getElementById('pt-next').style.display='block';
}
function nextPT(){ptState.cur++;ptState.answered=false;renderParticle();}

// ========== BUILD SENTENCE ==========
function startBuild(){
  bdState.q=[...BUILD_Q].sort(()=>Math.random()-.5);
  bdState.cur=0;bdState.correct=0;
  renderBuild();
}
function renderBuild(){
  const {q,cur,correct}=bdState;
  const el=document.getElementById('build-tab');
  const bar=Math.round(cur/q.length*100);
  let head=`<div class="qz-wrap"><div class="qz-ctrl">
    <div class="qz-prog-top"><span>Soal ${cur+1}/${q.length}</span><span>✅ ${correct}</span></div>
    <div class="pbg"><div class="pf" style="width:${bar}%"></div></div>
  </div>`;
  if(cur>=q.length){
    el.innerHTML=head+`<div class="qz-result"><div class="qz-score">${correct}/${q.length}</div><div class="qz-score-lbl">${correct>=q.length*.8?'🎉 Hebat sekali!':correct>=q.length*.5?'👍 Lumayan bagus!':'💪 Terus latihan!'}</div><p style="font-size:13px;color:var(--t2);margin-bottom:16px">Skor: ${Math.round(correct/q.length*100)}%</p><button class="restart-btn" onclick="startBuild()">Mulai Lagi</button></div></div>`;
    return;
  }
  const qq=q[cur];
  bdState.answer=[];
  bdState.pool=[...qq.words].sort(()=>Math.random()-.5);
  el.innerHTML=head+`<div class="build-card">
    <div class="slbl">Susun kata menjadi kalimat</div>
    <div class="build-target">"${qq.target}"</div>
    <div class="build-answer" id="bd-ans"></div>
    <div class="build-pool" id="bd-pool">${bdState.pool.map((w,i)=>`<button class="pool-word" id="pw${i}" onclick="pickWord(${i},'${w.replace(/'/g,"\\'")}','pw${i}')">${w}</button>`).join('')}</div>
    <div class="build-btns">
      <button class="build-btn" onclick="resetBuild()">↺ Reset</button>
      <button class="build-btn check" onclick="checkBuild()">✓ Cek</button>
    </div>
    <div id="bd-exp" class="fill-exp" style="margin-top:8px"></div>
    <button class="qz-next" id="bd-next" onclick="nextBuild()">Lanjut →</button>
  </div></div>`;
}

function pickWord(idx,word,btnId){
  const btn=document.getElementById(btnId);
  if(!btn||btn.classList.contains('used'))return;
  btn.classList.add('used');
  bdState.answer.push({idx,word,btnId});
  updBuildAns();
}
function updBuildAns(){
  const el=document.getElementById('bd-ans');
  if(!el)return;
  el.innerHTML=bdState.answer.map((item,i)=>`<span class="build-word" onclick="removeWord(${i})">${item.word}</span>`).join(' ');
}
function removeWord(i){
  const item=bdState.answer[i];
  const btn=document.getElementById(item.btnId);
  if(btn)btn.classList.remove('used');
  bdState.answer.splice(i,1);updBuildAns();
}
function resetBuild(){
  bdState.answer=[];
  document.querySelectorAll('.pool-word').forEach(b=>b.classList.remove('used'));
  updBuildAns();
}
function checkBuild(){
  const qq=BUILD_Q[bdState.cur>=BUILD_Q.length?0:bdState.cur];
  const userAns=bdState.answer.map(a=>a.word);
  const isOk=JSON.stringify(userAns)===JSON.stringify(qq.correct);
  if(isOk)bdState.correct++;
  const ansEl=document.getElementById('bd-ans');
  if(ansEl){ansEl.classList.add(isOk?'ok':'ng');}
  const exp=document.getElementById('bd-exp');
  if(exp){exp.style.display='block';exp.textContent=isOk?'✅ Benar!':'❌ Salah. Jawaban benar: '+qq.correct.join(' ');}
  document.getElementById('bd-next').style.display='block';
  document.querySelectorAll('.pool-word').forEach(b=>b.style.pointerEvents='none');
}
function nextBuild(){bdState.cur++;renderBuild();}

// ========== INIT ==========
renderList();updHC();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
